body:
  text: 聞見録卷十四宋邵伯溫撰元豐末神宗山陵韓康公尹洛凡上供之物皆預辦雖中貴人不敢妄有所求蓋公之子宗師從賢士大夫游有所聞必白公施行之又朱光庭掞杜純孝錫皆府官薦為山陵司屬二人忠信有餘多所論列役成而民被其賜公以功拜使相判大名既去而人益思之先是神宗靈駕次永安公迎於郊朱太妃護駕於後公亦迎之太妃還禁中偶為宣仁太后言宣仁怒曰韓某先朝老臣汝安得當望塵之禮太妃泣謝公之名重如此也韓持國大資知潁昌府時彥以狀元及第為簽判初見持國通謁者稱狀元持國怒曰狀元無官耶自此呼時彥簽判云彥終身銜之馬涓巨濟亦為狀元及第為秦州簽判初呼狀元吕晉伯為帥謂之曰狀元云者及第未除官也既為判官不可曰狀元也巨濟愧謝晉伯又謂巨濟曰科舉之學既無用修身為己之學其勉之時謝良佑顯道作州學教授顯道為伊川程氏之學晉伯每屈車騎同巨濟過之則顯道為講論語晉伯正襟肅容聽之曰聖人言行在焉吾不敢不肅又數以公事案牘委巨濟詳覆且曰修身為己之學不可後為政治民其可不知巨濟自以為得師後立朝為臺官有聲每曰吕公教載之恩也賢於時彥遠矣元祐初哲宗幼冲起文潞公以平章軍國重事召程頤正叔為崇政殿說書正叔以師道自居每侍上講色甚莊繼以諷諫上畏之潞公對上恭甚進士唱名侍立終日上屢曰太師少休公頓首謝立不去時公年九十矣或謂正叔曰君之倨視潞公恭議者為未盡正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重吾與潞公所以不同也識者服其言元祐三年范忠宣公為尚書右僕射有吳處厚者以蔡確題安州車蓋亭詩來上以謂謗訕宣仁太后得之怒曰蔡確以吾比武后當重謫呂汲公為左丞不敢言忠宣乞薄確之罪不從初議貶確新州忠宣謂汲公曰此路荆棘已七八十年吾輩開之恐自不免汲公又不敢言忠宣因乞罷政以觀文殿大學士知潁昌劉摯罷哲宗與宣仁太后復用忠宣為右相宣仁太后寢疾宰輔入問后留忠宣曰卿父仲淹可謂忠臣在章獻太后朝勸后盡母道在仁宗朝勸帝盡子道卿當似之嗚呼宣仁后之所以望忠宣者羣臣莫及也哲宗親政吕汲公欲遷殿中侍御史楊畏為諫議大夫忠宣曰天子諫官當用正人楊畏不可用汲公方約畏為助謂忠宣曰豈以楊畏嘗言公耶忠宣曰不知也蓋上初召忠宣畏嘗有言上不行忠宣故不知也忠宣因乞罷政上不許後楊畏首叛汲公凡可以害汲公者無所不至又李清臣首建紹述之議多害正人一日哲宗震怒謂門下侍郎蘇轍曰卿安得以秦皇漢武上比先帝蘇門下下殿待罪吕汲公等不敢仰視忠宣從容言曰史稱武帝雄材大略為漢七制之主蓋近世之賢君蘇轍果以比先帝非謗也陛下親政之初進退大臣不當如訶叱奴僕哲宗怒少霽罷朝蘇門下舉笏以謝忠宣曰公佛地位中人也蘇公與忠宣同執政忠宣寡言蘇公平昔若有所疑至此方知其賢忠宣屢乞罷政出知陳州章惇用事元祐黨禍起忠宣獨不預至吕汲公南遷忠宣齊戒上書救汲公惇怒亦謫節度副使永州安置忠宣欣然而往每諸子怨章惇忠宣必怒止之江行赴貶所舟覆扶忠宣出衣盡濕顧諸子曰此豈章惇為之哉至永州公之諸子聞韓維少師謫均州其子告章惇以少師執政日與司馬公議論多不合得免行欲以忠宣與司馬公議役法不同為言求歸白公公曰吾用君實薦以至宰相同朝論事不合即可汝輩以為今日之言不可也有愧而生者不若無愧而死諸子遂止元符末哲宗升遐上皇即位之初欽聖皇太后同聽政忠宣公自永州先以光祿卿分司南京鄧州居住蓋二聖欲用公矣遣中使至永州賜茶藥密諭曰皇帝與太皇太后甚知相公在先朝言事忠直今虛位以待相公不知目疾如何用何人醫治只為左右有不是當人阻隔相公公頓首謝又曰太后問相公官家即位行事如何天下人何說公曰老臣與逺方之人唯知鼓舞聖德又曰天下有不便事但奏來公曰敢不奉詔又曰鄧州且去否公曰已出望外如歸鄉里又曰離闕下日二聖再三言太后在宫中皇帝在藩邸甚知相公是直臣公感泣不已俄進右正議大夫提舉嵩山崇福宫繼復觀文殿大學士中太一宫使召赴闕供職而公病詔書有豈唯尊德尚齒昭示寵優庶幾鯁論嘉謀日聞忠告之語公捧詔泣曰上果用我矣目明全失風痺不隨恩重命輕死有餘責將至畿內上又遣中使賜銀合茶藥促公入覲仍宣渴見之意公曰老臣昏忘不可勉强中使曰朝廷有優禮公曰老臣命薄虛蒙聖眷又遣中使賜銀絹各五百以繼道路之費又遣國醫診視所須並出內府一錢不得取於公家候公疾愈乃得歸公乞歸潁昌養疾上不得已許之每見輔臣問安否乃曰范某得一識面足矣上知公不能起始命相公疾少間令醫者在門不許受私謝乃以天寧節所得冠帔請換服色上批其奏曰冠帔可留與骨肉醫者之服依所請卿忠言嘉謀宜時有陳奏以副朕眷待耆德求治之意公表謝復告老詔不允比詔至公已薨矣上與太皇太后聞震悼出涕先是公疾革精識不亂諸子侍讀口占遺表凡八事命門生李之儀次第之內一事云苦宣仁之謗議未明致保佑之憂勤不顯皆權臣務快其私憤非泰陵實謂之當然蓋忠宣思所以報宣仁后之託也諸子以其所言皆朝廷大事且防後患以公口占畫一繳申潁昌府用府印寄軍資庫公將葬李之儀作行狀且論平生立朝行己之大節蔡京用事小人附㑹言公之子正平等撰造中使至永州𫝊宣聖語以為遺表非公意也正平與李之儀皆下御史獄捶楚甚苦正平之儀欲誣服其𫝊宣中使獨不服曰舊制凡傳聖語受本於御前請寶印出注籍於內東門遣使受聖語籍中使從其家得永州𫝊宣聖語本有御寶如所言又驗內東門受聖語籍亦同又下潁昌府取正平所繳納遺表八事皆實獄遂解正平猶羈管象州之儀羈管太平州正平之家死于嶺外者十餘人獨正平遇赦得歸不出仕終身為選人蔡京者紹聖初為戶部尚書欲結后戚向氏墳寺事下開封府正平為開封府縣尉往按視其地曰向氏寺地步已足民田不可奪府以其言聞哲宗怒京贖銅二十斤京由此恨正平故欲誣殺之嗚呼使忠宣無恙相上皇於初載天下豈復有今日之禍公既病不能朝上皇始命相曰曾布與蔡京云嘉祐中李參自荆南帥召為三司使參政孫抃曰參刻剝聚斂之材不可用改羣牧使蓋祖宗不以財計用人至仁宗朝大臣所宗尚如此元豐初薛向自三司使除同知樞密院雖以能吏治曉財用進時朝廷下州縣令民戶養保馬天下以為不便宰執堅行之向獨以為不可以本官責知隨州既死至元祐初録其言諡恭敏聞見録卷十四
