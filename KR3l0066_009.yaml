body:
  text: 聞見録卷九宋邵伯溫撰富韓公初遊場屋穆修伯長謂之曰進士不足以盡子之才當以大科名世公果禮部試下時太師公官耀州公西歸次陜范文正公尹開封遣人追公曰有旨以大科取士可亟還公復上京師見文正辭以未嘗為此學文正曰已同諸公薦君矣久為君闢一室皆大科文字正可往就館時晏元獻公為相求婚於文正文正曰公之女若嫁官人某不敢知必求國士無如富某者元獻一見公大愛重之遂議婚公亦繼以賢良方正登第公之立朝初以危言直道事仁宗為諫官至知制誥宰相不悅故薦公以使不測之遼歐陽公上書引盧杞薦顔真卿使李希烈事言宰相欲害公也不報公能使遼之君臣誦公之言修好中國不復用兵者幾百年可謂大功矣然公每不自以為功也使回除樞密直學士又除翰林學士又除樞密副使公皆以奉使無狀力辭不拜且言遼既通好議者便謂無事邊備漸弛敵萬一敗盟臣死且有罪非獨臣不敢受亦願陛下思金人玩弄我朝之恥坐薪嘗膽不忘修政因以告納上前而罷逾月復除樞密副使時元昊使辭羣臣班紫宸殿門帝俟公綴樞密院班乃坐且使宰相章得象諭公曰此朝廷特用非以使遼故也公不得已乃受嗚呼使遼之功偉矣而不自有焉至知青州活飢民四十餘萬每自言以為功也蓋曰過於作中書令二十四考矣公之所以自任者世烏得而窺之哉蘇內翰奉詔撰公墓道之碑首論公使遼之功非公之心也伯溫先君子隱居謝聘與公為道義交獨為知之慶厯二年大遼以重兵壓境泛使劉六符再至求關南十縣之地遼意叵測在廷之臣無敢行者富韓公往聘面折遼之君臣遼辭屈增幣二十萬而和方富公再使也受國書及口傳之詞於政府既行謂其副曰吾為使者而不見國書萬一書辭與口傳者異則吾事敗矣發書視之果不同公馳還見仁宗具論之曰政府固為此欲置臣於死臣死不足惜奈國命何仁宗召宰相呂夷簡面問之夷簡從容袖其書曰恐是誤當令改定富公益辨論不平仁宗問樞密使晏殊曰夷簡決不肯為此真恐誤耳富公怒曰晏殊姦邪黨呂夷簡以欺陛下富公晏公之壻也富公忠直如此契丹既平仁宗深念富公之功御史中丞王拱辰對曰富弼不能止敵人溪壑無厭之求念陛下止一女若遼乞和親弼亦忍棄之乎帝正色曰朕為天下生靈一女非所惜拱辰驚懼知言之不可入因再拜曰陛下言及於此天下幸甚嗚呼吾仁宗聖矣哉拱辰蓋呂丞相之黨云至和間富公當國立一舉三十年推恩之法蓋公與河南進士假希元魏升平同場屋相善公作相不欲私之故為天下之制二人俱該此恩希元官至太子中舍致仕轉殿中丞升平官至大理寺丞此法至今行之嗚呼為宰相者能如富公可謂賢矣升平既卒公念之不忘招其子宜與子孫講學公薨宜亦老猶居門下至崇寧間立試門客法宜不為新學始求去仁宗末年富公自相位丁太夫人憂上遣使下詔起復者六七公竟不起至其末云天下得一不孝子且將何用仁宗乃從其請及英宗已即位魏公已遷左相故用富公為樞密相魏公已下皆遷官富公亦遷戶部尚書公辭曰竊聞陛下即位録用舊臣臣在憂服無可稱道乃取嘉祐中臣在中書日嘗議建儲以此為效而推今日之恩嘉祐中雖嘗泛議建儲之事仁宗尚祕其請其於陛下則如在茫昧杳冥之中未見形象安得如韓琦等後來功效之深切著明也又辭曰韓琦等七人委是有功可以重疊受陛下官爵臣獨無一毫之效又辭曰韓琦等七人於陛下有功有德獨臣於陛下無功不過在先朝有議論絲髮之勞又辭曰琦等勳烈彰灼明如日星中外執筆之士歌詠之不暇伏乞促令入謝以快羣望以此見富公豈因不預定䇿而歉魏公哉熙寧初富公再入與曽魯公並相呂公公弼為樞密使韓公綘趙公槩馮公京趙公抃皆為參知政事俱久次王荆公安石拜參知政事乃薦呂公公著為御史中丞有旨特許不避公弼公弼不自安乞出除宣徽使判太原府移秦州趙公槩致仕馮公趙公皆出富公判亳州曽公判永興軍惟韓公綘與荆公在政府既而綘宣撫陜西外拜昭文相荆公拜史館相綘失職以本官知鄧州荆公遂拜昭文相司馬溫公除樞密副使以議新法不合辭不拜出知永興軍呂公公著力言新法罷中丞出知永州韓公維亦以論不合罷開封府知河陽昔與荆公交遊揄揚之人皆退斥不用荆公獨用事乃以富公為沮青苗法落使相散僕射判汝州荆公後以觀文殿大學士知金陵乃薦呂惠卿為參知政事惠卿既得位遂叛荆公出平日荆公移書有曰無使齊年知謂馮公京蓋荆公與馮公皆辛酉人又曰無使上知神宗始不悅荆公矣惠卿又起李逢獄事連李士寧者蓬州人有道術荆公居喪金陵與之同處數年意欲併中荆公也又起鄭俠獄事連荆公之弟安國罪至追勒惠公求害荆公者無所不至神宗悟急召荆公公不辭自金陵泝流七日至闕復拜昭文相惠卿以本官出知陳州李逢之獄遂解其黨數人皆誅死李士寧止於編配嗚呼荆公非神宗保全則危矣再相不久復知金陵領宮祠至死不用初韓公綘論助役與荆公同後拜史館相亦為惠卿所不容出知定州熙寧二年富公判亳州以提舉常平倉趙濟言公沮格新法落武寧節度及平章以左僕射判汝州過南京張公安道為守列迎謁騎從於庭張公不出或問公公曰吾地主也已而富公來見張公門下客私相謂二公天下偉人其議論何如立屏後聽張公接富公亦簡相對屹然如山嶽富公徐曰人固難知也張公曰謂王安石乎亦豈難知者仁宗皇祐間某知貢舉院或薦安石有文學宜辟以考校姑從之安石者既來凡一院之事皆欲紛更之某惡其人檄以出自此未嘗與之語也富公俯首有愧色蓋富公素喜王荆公至得位亂天下方知其姦云元豐六年富公疾病矣上書言八事大抵論君子小人為治亂之本神宗語宰輔曰富弼有章疏來章惇曰弼所言何事帝曰言朕左右多小人惇曰可令分析孰為小人帝曰弼三朝老臣豈可令分析左丞王安禮進曰弼之言是也罷朝惇責安禮曰左丞對上之言失矣安禮曰吾輩今日曰誠如聖論明日曰聖學非臣所及安得不謂之小人惇無以對是年五月大星殞於公所居還政堂下空中如甲馬聲公登天光臺焚香再拜知其將終也異哉公既薨司馬溫公范忠宣弔之公之子紹庭紹京泣曰先公有自封押章疏一通殆遺表也二公曰當不啓封以聞蘇內翰作公神道碑謂世莫知其所言者是也神宗聞訃震悼出祭文遣中使設祭恩禮甚厚政府方遣一奠而已朝廷故例前宰相以使相致仕者給全俸富公以司徒使相致仕居洛自三公俸一百二十千外皆不受公清心學道獨居還政堂每早作放中門鑰入瞻禮家廟對夫人如賔客子孫不冠帶不見平時謝客文潞公為留守時節往來富公素喜潞公昔同朝更拜其母每勸潞公早退潞公愧謝既薨其子朝議名紹廷字德先守其家法者也公兩女與其壻及諸甥皆同居公之第家之事一如公無恙時毫髮不敢變鄉里稱之建中靖國初朝廷擢德先為河北西路提舉常平德先辭曰熙寧變法之初先臣以不行青苖法臣不敢為此官上益嘉之除祠部員外郎崇寧中德先卒鄭人朝詠之志其墓文甚美獨不書辭提舉常平事有所避也惜哉德先之子直柔事今上為同知樞密院事韓魏公自樞密副使以資政殿學士知揚州王荆公初及第為僉判每讀書至達旦略假寐日已高急上府多不及盥潄魏公見荆公少年疑夜飲放逸一日從容謂荆公曰君少年無廢書不可自棄荆公不答退而言曰韓公非知我者魏公後知荆公之賢欲收之門下荆公初不屈如召試館職不就之類是也故荆公熙寧日録中短魏公為多每曰韓公但形相好爾作畫虎圖詩詆之至荆公作相行新法魏公言其不便神宗感悟欲罷其法荆公怒甚取魏公章送條例司疏駮頒天下又誣呂申公有言藩鎮大臣將興晉陽之師除君側之惡自草申公謫詞昭著其事因以搖魏公賴神宗之明眷禮魏公終始不替魏公薨帝震悼親製墓碑恩意甚厚荆公有挽詩云幕府少年今白髮傷心無路送靈輀猶不忘魏公少年之語也熙寧二年韓魏公自永興軍移判北京過闕上殿王荆公方用事神宗問曰卿與王安石議論不同何也魏公曰仁宗立先帝為皇嗣時安石有異議與臣不同故也帝以魏公之語問荆公公曰方仁宗欲立先帝為皇子時春秋未高萬一有子措先帝於何地臣之論所以與韓琦異也荆公強辨類如此當魏公請册英宗為皇嗣時仁宗曰少俟後宮有就閣者公曰後宮生子所立嗣退居舊邸可也蓋魏公有所處之矣然荆公終英宗之世屢召不至實自慊也或云蔡襄亦有異議英宗知之襄不自安出知福州治平初英宗即位有疾疾作請光獻太后垂簾同聽政有入內都知任守忠者姦邪反復間諜兩宮時司馬溫公知諫院呂諫議為侍御史凡十數章請誅之英宗雖悟未施行宰相韓魏公一日出空頭勑一道參政歐陽公已簽參政趙槩難之問歐陽公曰何如歐陽公曰第書之韓公必自有説魏公坐政事堂以頭子勾任守忠至立庭下數之曰汝罪當死責蘄州團練副使蘄州安置取空頭敕填之差使臣即日押行其意以謂少緩則中變矣嗚呼魏公真宰相也歐陽公言吾為魏公作晝錦堂記云垂紳正笏不動聲色措天下於太山之安者正以此尹師魯以貶死其子朴方襁褓既長韓魏公聞於朝命官魏公到北京薦為屬教育之如子弟朴少年有才所為或過舉魏公挂師魯之像哭之朴亦早死嗚呼魏公者可以謂之君子矣張金部名方為白波三門發運使王司封名湛為副使文潞公父令公名異為屬官皆相善張金部召去薦文令公為代潞公為子弟讀書於孔目官張望家望嘗為舉子頗知書後𨽻軍籍其諸子皆為儒學潞公少年好遊令公怪責之潞公久不敢歸張望白令公曰郎君在某家學問益勤苦不復遊矣因出潞公文數百篇令公為之喜王司封欲以女嫁公其妻曰文彥博者寒薄其可託乎乃已後潞公出入將相張望尚無恙公判河南日母申國太夫人生日張望自河清來獻夀有詩云庭下郎君為宰相門前故吏作將軍張望以子通籍封將軍云望嘗曰吾子孫當以立門金石心為名長子靖與潞公同年登科兄弟為監司者數人潞公遇之甚厚至門字行諸孫益顯有為侍從者康節先生云嘗見張將軍沈深雄偉有異於衆人能識潞公於童子時宜其有後也文潞公少時從其父赴蜀州幕官過成都潞公入江瀆廟觀畫壁祠官接之甚勤且言夜夢神令灑掃祠庭曰明日有宰相來官豈異日之宰相乎公笑曰宰相非所望若為成都當令廟室一新慶厯中公以樞密直學士知益州聽事之三日謁江瀆廟若有感焉方經營改造中忽江漲大木數千章蔽流而下盡取以為材廟成雄壯甲天下又長老曰公為成都日多宴會歲旱公尚出遊有村民持焦榖苖來訴公罷會齋居三日禱於廟中即日雨歲大稔異哉文潞公幼時與羣兒擊毬入柱穴中不能取公以水灌之毬浮出司馬溫公幼與羣兒戲一兒墮大水甕中已沒羣兒驚走不能救公取石破其甕兒得出識者已知二公之仁智不凡矣聞見録卷九
