body:
  text: 聞見録卷一宋邵伯温撰太祖微時遊渭州潘原縣過涇州長武鎮寺僧守嚴者異其骨相隂使畫工圗於寺壁青巾褐裘天人之相也今易以冠服矣自長武至鳳翔節度使王彦超不留復入洛枕長夀寺大佛殿西南角柱礎晝寢有藏經院主僧見赤蛇出入帝鼻中異之帝寤僧問所向帝曰欲見柴太尉於澶州無以為資僧曰某有一驢子可乘又以錢幣為獻帝遂行柴太尉一見竒之留幕府未幾太尉為天子是謂周世宗帝與宣祖俱事之南征北伐屢建大功以至受禪萬世之基實肇於澶州之行帝即位盡召諸節度入覲宴苑中諸帥爭起論功惟彦超獨曰臣守藩無效願納節備宿衛帝喜曰前朝異世事安足論彦超之言是也從容問彦超曰卿當日不留我何也彦超曰涔蹄之水不足以澤神龍帝若為臣留則安有今日帝益喜曰獨令汝更作永興節度一任長夀寺僧亦召見帝欲官之僧辭乃以為天下都僧録歸洛今永興有彦超畫像長夀寺殿中亦有僧畫像皆偉人也嗚呼聖人居草昧之際獨一僧識之彦超雖不識及對帝之言自有理異哉周世宗死恭帝幼冲軍政多决於韓通並掌軍政通愚愎將士多離叛太祖英武有度量智略多立戰功故皆愛服歸心焉將北征京師之人喧言出軍之日當立㸃檢為天子富室或挈家逃匿他州太祖聞之懼密以告家人曰外間詾詾如此奈何太祖姑即魏氏長公主面如鐵色方在㕑引麫杖逐太祖曰大丈夫臨大事可否當自决乃於家間恐怖婦女何為耶太祖黙然而出太祖初登極時杜太后尚康寧與上議軍國事猶呼趙普為書記嘗勞撫之曰趙書記且為盡心吾兒未更事也太祖待趙韓王如左右手御史中丞馬德驤劾奏普強占市人第宅聚歛財賄上怒叱之曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎命左右曵於庭數匝徐復冠召升殿曰後當改姑赦汝勿令外人聞也太祖將受禪未有禪文翰林學士承㫖陶榖在旁出諸懐中進曰已成矣太祖繇是薄其為人榖墓在京師東門外覺昭寺已洞開空無一物寺僧云屢掩屢壊不曉其故張舜民曰陶為人輕險嘗自指其頭謂必戴貂蟬今髑髏亦無矣太祖初受天命誅李筠李重進威德日盛因問趙普自唐季以來數十年間帝王凡易十姓兵革不息生靈塗地其故何也今天下欲定長久之計其道如何普曰陛下言及此天下之福也唐季以来戰爭不息興廢無常者無他節鎮太重君弱臣强而已今欲治之惟稍奪其權制其錢穀收其精兵則天下安矣語未卒帝曰卿勿復言吾已悉矣頃之上因晚朝與故人石守信王審琦飲酒帝屏左右謂曰吾資爾曹之力多矣念爾之功不忘然為天子亦大艱難殊不若為節度使之樂吾今終夕未嘗敢安枕而卧也守信等問其故帝曰此豈難知所謂天位者衆欲居之爾守信等皆頓首曰陛下何為出此言今天命已定誰敢復有異心上曰不然汝曹雖無此心其如麾下之人欲富貴者何一旦以黄袍加汝之身汝雖欲不為其可得乎守信等泣涕曰臣愚不及此惟陛下哀憐示以可生之塗上曰人生如白駒過隙耳所謂富貴不過欲多積金錢厚自娛樂使子孫顯榮耳汝曹何不釋去兵權擇便好田宅市之為子孫立永久之業多置歌兒舞女日飲食相懽以終天命君臣之間兩無猜嫌上下相安不亦善乎守信等皆拜謝曰陛下念及此所謂生死而肉骨也明日皆稱病乞解兵權上許之皆以散官就第賜賚甚厚或與之結為婚姻置易制者使主親軍其後又置轉運使通判使主諸道錢榖收天下精兵以備宿衛而諸功臣亦以善終子孫富貴迄今不絶向非韓王謀慮深長太祖深明果斷天下無復太平之日矣聖賢之見何其逺哉世謂韓王為人隂刻當其用事時以睚眦中傷人甚多然子孫至今享福禄國初大臣鮮能及者得非安天下功大乎太祖遣曹彬伐江南臨行諭曰功成以使相為賞彬平江南歸帝曰今方隅未服者尚多汝為使相品位極矣豈肯復戰耶姑徐之更為吾取太原因密賜錢五十萬彬怏怏而退至家見錢布滿室乃歎曰好官亦不過多得錢耳何必使相也嗚呼太祖重惜爵位如此孔子稱惟名與器不可以假人太祖得之矣祖宗開國所用將相皆北人太祖刻石禁中曰後世子孫無用南士作相内臣主兵至真宗朝始用閩人其刻不存矣嗚呼以藝祖之明其前知也漢高祖謂吳王濞曰後五十年東南有亂者非汝耶然天下一家慎無反已而果然藝祖亦云太祖即位之初數出微行以偵伺人情或過功臣之家不可測趙普每退朝不敢脫衣冠一日大雪向夜普謂帝不復出矣久之聞叩門聲普出帝立風雪中普惶懼迎拜帝曰已約晉王矣已而太宗至共於普堂中設重裀地坐熾炭燒肉普妻行酒帝以嫂呼之普從容問曰夜久寒甚陛下何以出帝曰吾睡不能著一榻之外皆他人家也故来見卿普曰陛下小天下耶南征北伐今其時也願聞成算所向帝曰吾欲下太原普黙然久之曰非臣所知也帝問其故普曰太原當西北二邊使一舉而下則二邊之患我獨當之何不姑畱以俟削平諸國則彈丸黑子之地將無所逃帝笑曰吾意正如此特試卿耳遂定下江南之議帝曰王全斌平蜀多殺人吾今思之猶耿耿不可用也普於是薦曹彬為將以潘美副之明日命帥彬與美陛對彬辭才力不迨乞别𨕖能臣美盛言江南可取帝大言諭彬曰所謂大將者能斬出位犯分之副將則不難矣美汗下不敢仰視將行夜召彬入禁中帝親酌酒彬醉宫人以水沃其面既醒帝撫其背以遣曰㑹取㑹取他本無罪只是自家著他不得蓋欲以恩德來之也是故以彬之厚重美之明銳更相為助令行禁止未嘗妄戮一人而江南平皆帝仁聖神武所以用之得其道云太祖初即位朝太廟見其所陳籩豆簠簋則曰此何等物也侍臣以禮器為對帝曰我之祖宗寧曾識此命徹去亟令進嘗膳親享畢顧近臣曰却令設向來禮器俾儒士輩行事至今太廟先進牙盤後行禮康節先生嘗曰太祖皇帝其於禮也可謂達古今之宜矣東京唐汴州梁太祖因宣武府置建昌宫晉改曰大寧宫周世宗雖加營繕猶未如王者之制太祖皇帝受天命之初即遣使圗西京大内按以改作既成帝坐萬嵗殿洞開諸門端直如引繩則歎曰此如吾心小有邪曲人皆見矣帝一日登明德門指其榜問趙普曰明德之門安用之字普曰語助帝曰之乎者也助得甚事普無言太祖登極未久杜太后上仙初從宣祖葬國門之南奉先寺後命宰相范質為使改卜未得地質罷更命太宗為使遷奉於永安陵又欲遷逺祖於西京之榖水蓋宣祖微時葬也相並兩冢開壙皆白骨不知辨遂即墳為園歲遣官並祭洛人謂之一寢二位云伊川先生程頤曰為並葬擇地者可以謂之智矣太祖獵近郊所御馬失帝躍以下且曰吾能服天下矣一馬獨不馴耶即以佩刀刺之既而悔曰吾為天子數出游獵馬失又殺之其過矣自此終身不復獵太祖朝晉邸内臣奏請木塲大木一章造器用帝怒批其奏曰破大為小何若斬汝之頭也其木至今在半枯朽不動嗚呼太祖於一木不忍暴用以違其材况大者乎忠正軍節度使王審琦與太祖皇帝有舊為殿前都指揮使禁中火審琦不待召領兵入救臺諫官有言罷歸夀州本鎮朝辭太祖諭之曰汝不待召以兵入衛忠也臺臣有言不可不行第歸鎮吾當以女嫁汝子承衍者召承衍至則已有婦樂氏辭帝曰汝為吾壻吾將更嫁樂氏以御龍直四人控御馬載承衍歸遂尚秦國大長公主樂氏厚資嫁之帝謂承衍曰汝父可以安矣審琦歸鎮七年率先諸鎮納節以使相薨追封秦王諡正懿承衍官至䕶國軍節度使駙馬都尉河中尹薨贈中書令追封鄭王嗚呼太祖駕御英雄聽納言諫聖矣哉偽蜀孟昶以降王入朝舟過眉州湖㶞渡一宮嬪有孕昶出之祝曰若生子孟氏尚存也後生子今為孟氏不絶昶治蜀有恩國人哭送之至犍為别去因號曰蜀王灘蜀初平呂餘慶出守太祖諭曰蜀人思孟昶不忘卿官成都凡昶所𣙜稅食飲之物皆宜罷餘慶奉詔除之蜀人始欣然不復思故主矣真宗景德元年契丹入寇犯澶淵京師震動當時大臣有請幸金陵幸蜀者左相畢文簡公病不出右相寇萊公獨勸帝親征帝乃决遂幸澶淵帝初不欲過河寇公力請高瓊控帝馬渡浮梁帝登城六軍望黄屋呼萬嵗聲動原野士氣大振帝每使人覘萊公動息或曰寇準晝寢鼻息如雷或曰寇準方命庖人斫鱠帝乃安既射死敵驍將順國王達蘭敵懼請和帝令擇重臣報聘萊公遣侍禁曹利用上曰凡敵所須即許之萊公戒之曰若許過三十萬金幣吾斬若矣和議成諸將請設伏邀擊可使敵匹馬不返萊公勸帝勿從縱契丹歸國以保盟好帝囘鑾每歎萊公之功王欽若譛之曰陛下知博乎錢輸將盡取其餘盡出之謂之孤注陛下寇準之孤注也尚何念帝聞之驚甚萊公眷禮遂衰真宗東封西祀禮成海内晏然一日開太清樓宴親王宰執用仙韶女樂數百人有司以宮嬪不可視外於樓前起彩山幛樂聲若出於雲霄間者李文定公丁晉公坐席相對文定令行酒黄門密語晉公曰如何得倒了假山晉公微笑上見之問其故晉公以實對上亦笑即命女樂列樓下臨軒觀之宣勸益頻文定至霑醉章獻明肅太后成都華陽人少隨父下峽至玉泉寺有長老者善相人謂其父曰君貴人也及見后則大驚曰君之貴以此女也又曰逺方不足留盍遊京師乎父以貧為辭長老者贈以中金百兩后自家至京師真宗判南衙因張耆納后宮中帝即位為才人進宸妃至正位宮闈聲勢動天下仁宗即位以太皇太后垂簾聽政玉泉長老者已居長蘆矣后屢召不至遣使就問所須則曰道人無所須也玉泉寺無僧堂長蘆寺無三門后其念之后以本閤服用物下兩寺為錢建獨長蘆寺臨江門起水中既成輙為蛟所壊后必欲起之用生鐵數萬斤疊其下門乃成蓋蛟畏鐵也今玉泉寺僧堂梁記曰后所建云聞見録卷一
