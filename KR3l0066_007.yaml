body:
  text: 聞見録卷七宋邵伯溫撰范魯公質舉進士和凝為主文愛其文賦凝自以第十三登第謂魯公曰君之文宜冠多士屈居第十三者欲君傳老夫衣鉢耳魯公以為榮至先後為相有獻詩者云從此廟堂添故事登庸衣鉢亦相傳周祖自鄴舉兵向闕京師亂魯公隱於民間一日坐封丘巷茶肆中有人貌怪陋前揖曰相公無慮時暑中公所執扇偶書大暑去酷吏清風來故人詩二句其人曰世之酷吏寃獄何止如大暑也公他日當深究此弊因携其扇去公惘然久之後至祅廟後門見一土偶短鬼其貌肖茶肆中見者扇亦在其手中公心異焉亂定周祖物色得公遂至大用公見周祖首建議律條繁廣輕重無據吏得以因緣為姦周祖特詔詳定是為刑統范魯公戒子孫詩其略曰戒爾學立身莫若先孝悌怡怡奉親長不敢生驕易戰戰復兢兢造次必於是戒爾學干祿莫若勤道藝嘗聞諸格言學而優則仕不患人不知惟患學不至戒爾逺恥辱恭則近乎禮自卑而尊人先彼而後已相鼠與茅鴟宜鑒詩人刺戒爾勿曠放曠放非端士周孔垂名教齊梁尚清議南朝稱八達千載穢青史戒爾勿嗜酒狂藥非佳味能移謹厚性化為凶險類古今傾敗者歷歷皆可記戒爾勿多言多言衆所忌茍不慎樞機災厄從此始是非毁譽間適足為身纍舉世重交遊擬結金蘭契忿怨從是生風波當時起所以君子性汪汪淡如水舉世好奉承昻昻增意氣不知奉承者以爾為玩戲所以古人疾籧篨與戚施舉世重任俠俗呼為氣義為人赴急難往往陷刑制所以馬援書勤勤告諸子舉世賤清素奉身好華侈肥馬衣輕裘揚揚過閭里雖得市童憐還為識者鄙恭惟祖宗所用宰輔皆忠厚篤實之士獨魯公為之稱首余讀國史得其詩録以為子孫之戒僧海妙者謂余言昔出入丁晉公門下公作相時鑿池養魚覆以板每客至去板釣鮮魚斫膾其肴饌珍異不可勝數後自朱崖以祕書少監移光州海妙往見之公野服杖屨行山中觀村民採茶勞其辛苦人不知為晉公也公與海妙相别曰吾不死五年趙元昊叛邊事起朝廷更用大臣公無疾沐浴衣冠臥佛堂中而薨元豐二年豫居洛有老父年八九十自云少日隨丁晉公至朱崖頗能道當時事問之老人曰公自分司西京貶崖州某從行至龍門南彭婆鎮公病瘧夜遇盜失物甚多至今有玉碗在頴陽富家盜所質也至崖州久之某辭歸公授以蠟丸戒曰後西京知府與會府官即投之某如所教知府王欽若也對府官得之不敢開遽以奏乃自陳乞歸表也其中云雖滔天之罪大而立主之功髙繼有旨復祕書監移光州嗟夫任智數者君子所不為也世謂丁晉公王冀公皆任智數如老人之言則晉公又出冀公之上矣王內翰禹稱字元之濟州巨野人世農家九嵗為歌詩畢士安作州從事亟稱之長益能文有場屋聲登太平興國八年進士第召試相府擢右拾遺直史館因北敵犯邊獻書建和議太宗賞之宰相趙普尤加器重至景德間卒用其議與北通好又與夏侯嘉正羅處約杜鎬同校三史多所是正進左司諫知制誥因論徐鉉為人誣告內翰辨其非罪責商州團練副使尋召入翰林為學士孝章皇后上仙詔遷梓宫於故燕國長公主第羣臣不為服內翰言后嘗母儀天下當遵用舊禮罪以謗謫知滁州真宗即位以直言應詔召為知制誥咸平初修太祖實録與宰相論不合又以謗謫知黃州移蘄州死於官其平生大節如此故所著建隆遺事一曰篋中記自敘甚祕蓋曰吾太祖皇帝諸生也一代之事皆目所見者考於國史或有不同一曰上性嚴重少言酷好看書雖在軍中手不釋卷若聞人間有奇書不吝千金以求之顯德初從世宗南征初平淮甸有纖人譛於上世宗曰趙某自下夀州私有重車數乘世宗遣人伺察之果有籠篋數車遽令别入行在面開之無他物惟書數千卷世宗異之召上諭之曰卿方為朕作將帥辟土疆當堅甲利兵何用書為上頓首謝曰臣無奇謀上贊聖德濫膺寄任嘗恐不逮所以聚言觀覽欲廣見聞增智慮也世宗曰善史曰上北征之夕次陳橋驛羅彥環等獻中央之服立上為天子請登馬南歸才出驛門上勒馬不前謂諸將校曰我有號令能稟之乎諸將皆伏地聽命上曰爾輩自貪爵賞逼我為君今入京師不得輒恣劫掠依吾令即當有重賞不然則連羣撥隊有斧鉞之誅諸將皆再稟命戎馬遂行既入國門兵至如賓秋毫不犯先是京城居人聞上至皆大恐將謂循五代之弊縱士卒剽掠既見上號令兵士即時解甲歸營市井不動略無搔擾衆皆大喜又聞上驛前誡約之事滿城父老皆相賀曰五代天子皆以兵威強制天下未有德信黎庶者今上踐阼未終日而有愛民之心吾輩老矣何幸見真天子之御世乎自唐末至五代藩方節制皆不稟朝命上踐阼豁達大度推赤心以待之繇是諸路節將懷德畏威不敢跋扈歲時貢奉無闕朝廷亟召亟至皆執藩臣之節甚恭識者知德威之行矣太平之基立矣又曰杜太后度量恢廓有才智國初內助為多上初自陳橋即帝位進兵入城人先報曰點檢上時官為點檢已作天子歸矣時后寢未興聞報安臥不答晉王輩皆驚躍奔走出迎晉王後受命是為太宗斯須有上親信人至入白后后乃徐徐而起曰吾兒素有大志果有今日矣俄頃上至見后於堂上衆皆賀之惟后愀然不樂上甚訝之左右進白后曰臣聞母以子貴自古如此后子今作天子胡為不樂后謂上曰吾聞為君不易且天子者致身於兆庶之上若治得其道則此位可尊或失馭則欲為匹夫不得是吾所以憂也子宜勉之上再拜曰謹受教又曰乾德開寶間天下將大定惟河東未遵王化而疆土實廣國用豐羡上愈節儉宮人不及二百猶以為多又宮殿內惟挂青布緣簾緋絹帳紫紬褥御衣止赭袍以綾羅為之其餘皆用絁絹晉王已下因侍宴禁中從容言服用太草草上正色曰爾不記居甲馬營中時耶上雖貴為萬乘其不忘布衣時事皆如此又曰開寶末議遷都於洛晉王言京師屯兵百萬全藉汴渠漕運東南之物贍養之若遷都於洛恐水運艱阻闕於軍儲上省表不報命留中而已異日晉王宴見從容又言遷都非便上曰遷洛未已久當遷雍晉王叩其旨上曰吾將西遷者無它欲據山河之勝而去冗兵循周漢之故事以安天下也晉王又言在德不在險上不答晉王出上謂侍臣曰晉王之言固善姑從之不出百年天下民力殫矣又曰上享天下十七年左右內臣有五十餘員止令掌宮掖中事未嘗令預政事或有不得已而差出外方止令幹一事不得妄採聽他事奏陳天下以為幸開寶末差內臣禱名山大川俄有黃門於洞穴採得怪石有類羊形以為異而獻之上曰此是墳墓中物何用獻為命碎其石仍杖其黃門逐之不受內臣所媚皆如此又曰乾德初浙西錢俶來朝上待之甚厚俶方到闕自晉王丞相及中外臣僚有表章五十餘封請留俶上曰錢俶在本國歲修職貢無闕今又委質來朝若利其土宇而留之殆非人主之用心何以示信於天下也奏俱不納俶辭歸國賜與金幣名馬之外别以黃絹封署文書一角付俶曰候至本國開之仍諭俶曰朕知卿忠勤若朕嘗安健公則嘗有東南他人即不可也俶感泣拜謝而去俶至錢塘開把中文字乃是晉王丞相已下請留箋章五十餘封俶大驚以表稱謝上存心仁信類如此嗚呼王內翰前輩諸公識與不識皆尊師之曰古之遺直也伯溫晚生得其私書於海內兵火之餘取可傳者列之李文定公迪為學子時從种放明逸先生學將試京師從明逸求當塗公卿薦書明逸曰有知滑州桞開仲塗者奇才善士當以書通君之姓名文定携書見仲塗以文卷為贄與謁俱入久之仲塗出曰讀君之文須沐浴乃敢見因留之門下一日仲塗自出題令文定與其諸子及門下客同賦賦成驚曰君必魁天下為宰相令門下客與諸子拜之曰異日無忘也文定以狀元及第十年致位宰相仲塗門下客有桞某者後官至侍御史文定公命長子東之娶其女不忘仲塗之言也文定所擬賦題不傳如王沂公曾初作有物混成賦識者知其決為宰相蓋所養所學發為言辭者可以觀矣程明道先生為伯溫云寇萊公既貴因得月俸置堂上有老媼泣曰太夫人捐館時家貧欲絹一匹作衣衾不可得不及公之今日也公聞之大慟故居家儉素所臥青帷二十年不易或以公孫𢎞事靳之公笑曰彼詐我誠尚何愧故魏野贈公詩曰有官居鼎鼐無宅起樓臺後北使在廷目公曰此無宅相公耶或曰公頗專奢縱非也蓋公多典藩於公會宴設則甚盛亦退之所謂甔石之儲嘗空於私室方丈之食每盛於賓筵余得於公之甥王公丞相所作公墓志公遺事如此張文定公齊賢河南人少為舉子貧甚客河南尹張全義門下飲啖兼數人自言平時未嘗飽遇村人作願齋方飽嘗赴齋後時見其家懸一牛皮取煮食之無遺太祖幸西都文定公獻十䇿於馬前召至行宮賜衛士廊餐文定就大盤中以手取食帝用拄斧擊其首問所言十事文定且食且對略無懼色賜束帛遣之帝歸謂太宗曰吾幸西都為汝得一張齊賢宰相也太宗即位齊賢方赴廷試帝欲其居上甲有司置於丙科帝不悅有旨一榜盡除京官通判文定得將作監丞通判衡州不十年位宰相矣河南節度使李守正叛周高祖為樞密使討之有麻衣道者謂趙普曰城下有三天子氣守正安得久未幾城破先是守正子婦符彥卿女也相者謂貴不可言守正曰有婦如此吾可知矣叛意乃決城破舉家自焚符氏坐堂上不動兵入叱之曰吾父與郭公有舊汝輩不可以無禮見加或白公命柴世宗納之後為皇后三天子氣者周高祖柴世宗本朝藝祖同在軍中也麻衣道者其異人乎華山隱士陳摶字圖南唐長興中進士遊四方有大志隱武當山詩云他年南面去記得此山名本朝張鄧公改南面為南嶽題其後云蘚壁題詩志何大可憐今老華圖南蓋唐末時詩也常乘白騾從惡少年數百欲入汴州中途聞藝祖登極大笑墜騾曰天下於是定矣遂入華山為道士葺唐雲臺觀居之藝祖召不至太宗召以羽服見於延英殿顧問甚久送中書見宰輔丞相宋琪問曰先生得玄默修養之道可以教人乎曰摶不知吐納修養之理假令白日沖天亦何益於聖世上博達今古深究治亂真有道仁明之主正是君臣同德致理之時勤心修煉無出於此琪等稱歎以其語奏帝益重之帝初問以伐河東之事不答後師出果無功還華山數年再召見謂帝曰河東之事今可矣遂克太原帝以其善相人也遣詣南衙見真宗及門亟還問其故曰王門厮役皆將相也何必見王建儲之議遂定後賜號為希夷先生真宗即位先生已化因西祀汾陰幸雲臺觀謁其祠加禮焉帝知建儲之有助也嗚呼世以先生為神仙善人倫風鑒淺矣至康節先生實傳其道於先生之細者尚以比漢四皓云种先生放字明逸隱居終南山豹林谷聞華山陳希夷先生之風往見之希夷先生一日令灑掃庭除曰當有嘉客至明逸作樵夫拜庭下希夷挽之而上曰君豈樵者二十年後當為顯官名聳聞天下明逸曰某以道義來官祿非所問也希夷笑曰人之貴賤莫不有命貴者不可為賤亦猶賤者不可為貴也君骨相當爾雖晦迹山林恐竟不能安異日自知之後明逸在真廟朝以司諫赴召帝携其手登龍圖閣論天下事蓋眷遇如此及辭歸山遷諫議大夫東封改給事中西祀改工部侍郎希夷又謂明逸曰君不娶可得中夀明逸從之至六十歲卒先是希夷為明逸卜上世葬地於豹林谷下不定穴既葬希夷見之言地固佳安穴稍後世世當出名將明逸不娶無子自其姪世衡至今為將帥有聲希夷既上表定日解化於華山張超谷石室中明逸立碑敘希夷之學曰明皇帝王伯之道云嗚呼仙者非希夷而誰歟錢若水為舉子時見陳希夷於華山希夷曰明日當再來若水如期往見有一老僧與希夷擁地罏坐僧熟視若水久之不語以火箸畫灰作做不得三字徐曰急流中勇退人也若水辭去希夷不復留後若水登科為樞密副使年才四十致政希夷初謂若水有仙風道骨意未決命老僧者觀之僧云做不得故不復留然急流中勇退去神仙不逺矣老僧麻衣道者也希夷素所尊禮云康節先生嘗誦希夷先生之語曰得便宜事不可再作得便宜處不可再去又曰落便宜是得便宜故康節詩云珍重至人嘗有語落便宜是得便宜蓋可終身行之也李文靖公作相嘗讀論語或問之公曰沆為宰相如論語中節用而愛人使民以時兩句尚未能行聖人之言終身誦之可也咸平景德中李文靖公沆在相位王文正公旦知政事時西北二方未平羽書邊報無虛日上既宵旰二公寢食不遑文正公歎曰安得及見太平吾輩當優遊矣文靖公曰國家有強敵外患足以警懼異日天下雖平上意浸滿未能高拱無事某老且死君作相時當自知之無深念也及北鄙和好西陲款附於是朝陵展禮封山行慶巨典盛儀無所不講文靖已死文正既衰疲於贊導每歎息曰李文靖真聖人也故當時謂文靖為聖相呂文穆公諱蒙正微時於洛陽之龍門利涉院土室中與溫仲舒讀書其室中今有畫像有詩云八灘風急浪花飛手把魚竿傍釣磯自是鉤頭香餌别此心終待得魚歸又云怪得池塘春水滿夜來雷雨起南山後狀元及第位至宰相溫仲舒第三人及第官至尚書公在龍門時一日行伊水上見賣瓜者意欲得之無錢可買其人偶遺一枚於地公悵然取食之後作相買園洛城東南下臨伊水起亭以饐瓜為名不忘貧賤之義也聞見録卷七
