  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0066_WYG_005-1a, image: WYG1038/WYG1038-0737a.png}
body:
  text: 聞見録卷五宋邵伯溫撰紹聖初哲宗親政用李清臣為中書侍郎范丞相純仁與清臣論事不合范公求去帝不許范公堅辭帝不得已除觀文殿大學士除潁昌府召章惇為相未至清臣獨當中書益覬幸相位復行免役青苗法除諸路常平使者惇至不能容以事中之清臣出知北京建中靖國初上皇即位用韓忠彥為相清臣為門下侍郎忠彥與清臣有連故忠彥惟清臣言是聽清臣復用事范右丞純禮忠彥所薦清臣罷之劉安世呂希純皆忠彥所重清臣不使入朝外除安世帥定武希純帥高陽張舜民忠彥薦為諫大夫清臣出之帥真定其所出與外除及不使入朝者皆賢士清臣素所憚不可得而用者忠彥懦甚不能為之主曽布為右相范致虛諫疏云河北三帥連衡恐非社稷之福劉安世呂希純同日報罷清臣亦為布所陷出知北京伯溫嘗論紹聖建中靖國之初朝廷邪正治亂未定之際皆為一李清臣以私意幸相位壞之邪説既勝衆小人並進清臣自亦不能立於朝矣使清臣在紹聖初同范丞相在建中靖國初同范右丞劉安世呂希純張舜民以公議正論共濟國事則朝廷無後日之禍而清臣亦得相位矣此忠臣義士惜一時治亂之機為之流涕者也元符末上皇即位皇太后垂簾同聽政有旨復哲宗元祐皇后孟氏位號自瑶華宮入居禁中時有論其不可者曰上於元祐后叔嫂也叔無復嫂之理程伊川先生謂伯溫曰元祐皇后之言固也論者之言亦未為無理伯溫曰不然禮曰子甚宜其妻父母不説出子不宜其妻父母曰是善事我子行夫婦之禮焉皇太后於哲宗母也於元祐后姑也母之命姑之命何為不可非上以叔復嫂也伊川喜曰子之言得之矣相繼姦臣曽布蔡京用事朋黨之禍再作元祐后竟出居舊宮者二十年靖康初大金陷京師逼上皇淵聖帝北狩宗族盡徙獨元祐后以在道宮不預寇退羣臣請入禁中垂簾聽政以安反側至上即位於宋幸維揚寇再犯幸餘杭后於艱難中輔成上聖德為多后崩上哀悼甚不能視朝者纍日下詔服齊衰諡曰昭慈聖獻嗚呼后逮事宣仁聖烈太后其賢有自矣至於廢興則天也熙寧初韓魏公罷政富公再相神宗首問邊事公曰陛下即位之初當布德行惠願二十年不言用兵二字蓋是時王荆公已有寵勸帝用兵以威四夷初是用王韶取熙河以斷西夏右臂又欲取靈武以斷大遼右臂又結高麗欲圖大遼又用章惇為察訪使以取湖北夔峽之蠻又用劉彝知桂州沈起為廣西路安撫使以窺交趾二人不密造戰艦於富良江上交趾偵知先浮海載兵陷廉州又破雍州殺守臣蘇緘屠其城掠生口而去又用郭逵趙卨宣撫廣南使直搗交趾逵老將與卨議論不同為交趾扼富良江兵不得進瘴死者十餘萬人元豐四年五路大進兵取靈武夏人決黃河水匱以灌吾壘兵將凍溺餓飢不戰而死者數十萬人又用呂惠卿所薦徐禧築永樂城夏人以大兵破之自禧而下死者十餘萬人報夜至帝早朝當寧慟哭宰執不敢仰視帝歎息曰永樂之舉無一人言其不可者右丞蒲宗孟進曰臣嘗言之帝正色曰卿何嘗有言在內惟呂公著在外惟趙卨曽言用兵不是好事既又謂宰執曰自今更不用兵與卿等共享太平然帝從此鬱鬱不樂以至大漸嗚呼痛哉元符末哲宗升遐上皇即位欽聖皇太后垂簾同聽政召范忠宣公於永州虛宰席以待忠宣病不能朝乃拜韓忠彥為左僕射安燾有時望方服母喪乃拜曽布為右僕射次年改建中靖國欽聖太后上仙布為山陵使布與內臣劉瑗交通多知禁中事就陵下密諭中丞趙挺之建議紹述以迎合上意布還朝與忠彥勢相敵漸逐忠彥薦引之士右丞范公純禮為人沈默剛正數以言忤上布憚之謂駙馬都尉王詵曰上欲除君樞密都承旨范右丞不以為然遂罷蓋詵嘗以劄子求此官於上上稟皇太后后曰王詵浮薄果使為之則壞樞密院駙馬都尉王師約在先朝為此官稱職可命之上從王詵所納劄子批除王師約樞密都承旨皇太后之意也布妄言出於范右丞以激怒詵詵信而恨之後詵因館伴大遼使妄稱范右丞押宴席間語犯御名辱國右丞不復辨以端明殿學士出知潁昌府自此忠彥之客相繼被逐矣布專意紹述盡復紹聖元符之政忠彥懦而無智既怨布乃曰布之自為計者紹述耳吾當用能紹述者勝之遂召蔡京京之用自韓忠彥始忠彥竟不能安其位罷去布獨相臺諫官陳瓘龔夬輩多賢者皆布所用亦不合去蔡京拜右丞至作相蔡卞知樞密院京既用事曽布罷相京師起大獄治布贓狀貶布白州司户參軍廉州安置布之諸子及門下士皆重責蔡京為之也韓忠彥亦安置於河北近郡尋聽自便京隂報其薦引之功云大觀末上頗厭京因星變出之又以飾臨平之山決興化之水等事謂其有不利社稷之心貶太子少傅居蘇州上用張商英為右相商英無術寡謀藐視同列間言並興上不樂罷之京密結內臣童貫因貫使大遼歸詐言遼主問蔡京何在上信之再召京時何執中已為左相乃拜京太師謂之公相總三省事童貫既引京自欲為樞密使京止以為太尉節度使陜西宣撫使貫大失望始怨京矣京以太師致仕上命鄭居中為相居中丁母憂去余深皆鄙夫小人無足言又相王黼黼年少凶愎欲其功高蔡京乃獨任結大金滅大遼取燕雲事置經撫房樞密院皆不預下族誅之令禁言北事黼後以太傅致仕猶領應奉司以固上寵白時中李邦彥並左右相儇薄庸懦無所立蔡京以盲廢復出領三省事用其子絛為謀主絛與其兄相仇絛敗京復致仕宣和七年十一月上郊天罷方恭謝景靈宮聞金人舉兵犯京師上下詔稱上皇禪位於淵聖皇帝改元靖康李邦彥主和議遣李鄴李稅鄭望之使金割三鎮為城下之盟兵退李邦彥罷復不許三鎮次年冬金破京師二帝北狩今上即位於宋幸維揚渡江幸餘杭嗚呼曽布蔡京王黼之罪上通於天也具載之以為世戒聞見録卷五
