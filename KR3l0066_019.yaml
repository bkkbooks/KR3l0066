body:
  text: 聞見録卷十九宋邵伯温撰熙寜初王宣徽之子名正甫字茂直監西京糧料院一日約康節先公同吳處厚王平甫㑹飯康節辭以疾明日茂直來康節謂曰某之辭㑹有以姑聽之吳處厚者好議論平甫者介甫之弟介甫方執政行新法處厚每譏刺之平甫雖不甚主其兄若人面罵之則亦不堪矣此某所以辭㑹也茂直笑曰先生料事之審如此昨處厚席間毁介甫平甫作色欲列其事於府某解之甚苦乃已嗚呼康節以道德尊一代平居出處一飯食之間其慎如此為子孫者當念之熙寜中洛陽以道德為朝廷尊禮者大臣曰富韓公侍從曰司馬温公吕申公士大夫位卿監以清德早退者十餘人好學樂善有行義者幾二十人康節先公𨼆居謝聘皆相從忠厚之風聞於天下里中後生皆知畏㢘恥欲行一事必曰無為不善恐司馬端眀知邵先生知嗚呼盛哉康節先公嘉祐中朝廷以遺逸命官辭之不從河南尹遣官就第送告勑朝章康節服以謝即褐衣如初至熙寧初再命官三辭又不從再朝章謝且曰吾不復仕矣始為𨼆者之服烏㡌縚褐見卿相不易也司馬温公依禮記作深衣冠簪幅巾縉帶每出朝服乗馬用皮匣貯深衣隨其後入獨樂園則衣之常為康節曰先生可衣此乎康節曰某為今人當服今時之衣温公歎其言合理富公未第時家於水北上陽門外讀書於水南天宫寺三學院院有行者名宗顥嘗給事公左右及公作相顥已為僧用公奏賜紫方袍號寳月大師公致政築大第於至德坊與天宫寺相邇公以病謝客宗顥来或不得前則直入道堂見公曰相公頗憶院中讀書時否公每為之笑時節送遺甚厚康節先公自共城遷洛未為人所知也宗顥獨館焉可見宗顥非俗僧也康節登其院嘗作洛陽懷古賦曰洛陽之為都也地居天地之中有中天之王氣在焉予家此治平嵗㑹秋乗雨霽與殿院劉君玉登天宫寺三學閣洛之風景因得周覽惜其百代興廢以乗天子雖都之而多不得其乆居也故有懷古之感以通諷誦諭君王好賦以賦言秋雨霽日色清景方出秋益眀何幽懷之能快唯髙閣之可憑天之空廓風之輕泠覽三川之形勝感千古之廢興乃眷西北物華之妍雲情物態一氣茫然擁樓閣以髙下煥金碧之光鮮當地勢之拱處有王居之在焉惜乎天子居東都此邦若諸夏不㑹要於方来不號令於天下聲明文物不此而出道德仁義不此而化宫殿森列鞠而為茂草園囿棊布荒而為平野鑾輿曾不到者三十餘年使人依然而歎曰虚有都之名也噫夏王之治水也四海之内列壤惟九而居中者實曰豫州荆河之北此為上流周公之卜宅也率土之濱進國為萬而居中者實曰洛陽瀍澗之側此唯舊都迄於今二千年之有餘因興替之不定故靡常其厥居我所以作賦者閱古今變易之時述興亡異同之迹追既失之君王存後来之國家也噫大昊始法二帝成之三王全法參用適宜伊六聖之經理實萬世之宗師我乃謂治民之道於是乎大盡矣逮夫五霸抗軌七雄駕威漢之興乗秦之弊曹之擅幸漢之衰始鼎立而治終豆分而隳晋中原之失守宋江左之畫畿或走齊而驛魏或道陳而經隋自元魏廓河南之土植六朝之風物李唐蟠闗中之腹孕五代之亂離其間或道勝而得民或兵强而慴下或虎吞而龍噬或雞狂而犬詐或創業於艱難或守成於逸暇或覆餗而終焉或苞桑而振者故得陳其六事雖善惡不同其成敗一也其一曰大哉德之為大也能潤天下必先行之於身然後化之於人化也者效之也自人而效我者也所以不嚴而治不為而成不言而信不令而行順天下之性命育天下之生靈其帝者之所為乎其二曰至哉政之為大也能公天下必先行之於身然後敎之於人敎也者正之也自我而正人者也所以有嚴而治有為而成有言而信有令而行㧞天下之疾苦遂天下之生靈其王者之所為乎其三曰壯哉力之為大也能致天下必先豐府庫峙倉箱鋭鋒鏑峻金湯嚴法令於烈火肅兵刑於秋霜竦民聽於上下慴夷心於外荒其霸者之所為乎其四曰時若傷之於隨失之於寛始則廢事乆而生姦既利不能勝害故冗得以疾賢是必薄其賦斂欲民不困而民愈困省其刑罰欲民不殘而民愈殘盖致之之道失其本矣其五曰時若任之以眀專之以察始則烈烈終焉闕闕既上下以交虐乃恩信之見奪是以峻其刑罰欲民不犯而民愈犯厚其賦斂欲國不竭而國愈竭盖致之之道失其末矣其六曰水旱為沴年嵗耗虚此天地之常理雖聖人不能無盖有備而無患貴儆戒於不虞不得中者加以寛猛失政重輕逸權不有水旱而民已困而況有水旱兵革者焉所謂本末交失不亡何待天下有成敗六焉此之謂也君天下者得不用聖帝之典謨行明王之敎化士可殺不可辱民可近不可下上能撫如子焉下必戴其后也仲尼所以陳革命則抑為人之匪君眀遜國則杜為人之不臣定禮樂而一天下之政教修春秋而罪諸侯之亂倫刪詩以揚文武之美序書以尊堯舜之仁贊大易以都括與六經而並存意者不可以地之重易民之教悖天之時必時敎之各備則居地而得宜是故知地不可固有之也君上必欲上為帝事則請執天道焉中為王事則請執人道焉下為霸事則請執地道焉三道之間能舉其一千古之上猶反掌焉則是洛之興也又何計乎都與不都也如欲用我吾從其中康節先生經世之學盖如此託賦以自見耳熙寧間宗顥尚無恙伯温嘗就其院讀書宗顥每以富公為學晩事相勉曰公夜枕圎枕庶睡不能乆欲有所思冬以冰雪夏以新水沃面其勤苦如此康節先公懷古賦初無本唯宗顥能誦之年幾九十乃死康節先公先天之學伯温不肖不敢稱贊平居於人事禨祥未嘗輒言治平間與客㪚歩天津橋上聞杜鵑聲慘然不樂客問其故則曰洛陽舊無杜鵑今始至有所主客曰何也康節先公曰不二年上用南士為相多引南人專務變更天下自此多事矣客曰聞杜鵑何以知此康節先公曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥飛𩔖得氣之先者也春秋書六鷁退飛鸜鵒來巢氣使之也自此南方草木皆可移南方疾病瘴瘧之𩔖北人皆苦之矣至熙寧初其言乃騐異哉故康節先公嘗有詩曰流鶯啼處春猶在杜宇来時春已非又曰㡬家大第横斜照一片殘春啼子規其旨深矣伯温後聞熙州有唐碑本朝未下時一日有家雀數千集其上人惡之曰豈此地將為漢有耶因焚之盖敵中無此禽也已而果然因并記之以信先君之説康節先公於書無所不讀獨以六經為本盖得聖人之深意平生不為訓解之學嘗曰經意自明苦人不知耳屋下盖屋牀下安牀滋惑矣所謂陳言生活者也故有詩曰陳言生活不須矜自是中才皆可了以老子為知易之體以孟子為知易之用論文中子謂佛謂西方之聖人不以為過於佛老之學口未嘗言知之而不言也故有詩曰不佞禪伯不諛方士不出户庭直際天地其所著皇極經世書以元㑹運世之數推之千嵗之日可坐致也以太極為堂奥乾坤為門户包括六經隂陽剛柔行乎其間消息盈虚相為盛衰皇王帝伯相為治亂其肻為訓解之學也哉熙寧三年四月朝廷初行新法所遣使者皆新進少年遇事風生天下騷然州縣始不可為矣康節先公閑居林下門生故舊仕宦四方者皆欲投劾而歸以書問康節先公康節先公答曰正賢者所當盡力之時新法固嚴能寛一分則民受一分之賜矣投劾而去何益嗚呼康節先公深達世務不以沽激取虚名如此世所謂康節先公為𨼆者非也康節先公出行不擇日或告之以不利則不行盖曰人未言則不知既言則有知而必行則鬼神敵也春秋祭祀約古今禮行之亦焚楮錢程伊川怪問之則曰眀器之義也脱有一非豈孝子慈孫之心乎又曰吾髙曾今時人以籩豆簠簋薦牲不可也伯温謹遵遺訓而行之也伯温昔侍家庭請於康節先公曰大人至和中仁宗在御富公當國可謂盛矣乃謝聘不起何也先公曰本朝至仁宗政化之美人材之盛朝廷之尊極矣前或未至後有不及也天之所命非偶然者吾雖出尚何益是非爾所知也伯温再拜稽首不知所以問康節先公遺訓曰汝固當為善亦須量力以為之若不量力雖善亦不當為也故有詩曰量力動時無悔吝隨宜樂處省營為若求騏驥方乘馬只恐終身無馬騎又嘗曰善人固可親未能知不可急合惡人固可踈未能逺不可急去必招悔吝也故無吝君亭曰見善人未嘗急合見不善人未嘗急去伯温佩之終身不敢忘康節先公言昔東京有一道人日飲酒於市醉後輒與人曰今日當有某人來已而果然自此莫不然或問其先知何術曰無心耳曰無心可學乎曰才欲使人學無心即有心矣程伊川先生言昔貶涪州過漢江中流船㡬覆舉舟之人皆號泣伊川但正襟安坐心存誠敬已而船及岸於同舟衆人中有老父問伊川曰當船危時君正坐甚莊何以伊川曰心守誠敬耳老父曰心守誠敬固善不若無心伊川尚欲與之言因忽不見嗚呼人果無心險難在前猶平地也老子曰入水不濡入火不熱唯無心者能之康節先公見一道人言嘗泛海遇舶風泊岸與數人下採薪有巨人數十長丈餘相呼之聲如禽獸盡捉以去用竿竹魚貫之食薦酒道人者偶在其竹未巨人醉睡走登船得脱因解衣出其所穿跡在脇下康節先公曰四海之外何所不有但人耳目不能及耳聞見録卷十九
