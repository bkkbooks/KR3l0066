body:
  text: 聞見録卷四宋邵伯溫撰熙寧七年春契丹遣泛使蕭禧來言代北對境有侵地請遣使分畫神宗許之而難其人執政議遣太常少卿判三司開拆司劉公忱為使忱對便殿曰臣受命以來在樞府考核文據未見本朝有尺寸侵敵地且鴈門者古名限塞雖跬步不可棄奈何欲委五百里之疆以資敵乎臣既辱使指當以死拒之惟陛下主臣之言幸甚帝韙之忱出疆帝手敕曰寇理屈則忿卿姑如所欲與之忱不奉詔初以袐書丞呂公大忠為副使命下大忠丁家艱詔起復未行公亦使回敵又遣蕭禧來帝開天章閣召執政與忱大忠同對資政殿論難之久帝曰凡敵爭一事尚不肯已今兩遣使豈有中輟之理卿等為朝廷固惜疆境誠是也然何以弭患大忠進曰彼遣使相來即與代北之地若有一使曰魏王英弼者來求關南之地則如何帝曰卿是何言也大忠曰陛下既以臣言為不然今代北安可啓其漸忱進曰大忠之言社稷大計願陛下熟思之執政皆知不可奪罷忱為三司鹽鐵判官大忠乞終喪制帝遣中使賜富韓公韓魏公文潞公曽魯公手詔其略曰朝廷通好契丹幾八十年近歲以來生事彌甚代北之地素無定封故造釁端妄求理辨比敕官吏同加案行雖圖籍甚明而詭辭不服又橫使復至意在必得敵情無厭勢恐未已萬一不測何以待之古之大政必詔故老云云韓魏公疏曰臣觀近年以來朝廷舉事則似不以大敵為恤敵人見形生疑必謂我有圖復燕南之意雖聞北主孱而妄弱豈無强梁宗屬與夫謀臣䇿士引先發制人之說造此釁端故屢遣使以爭理地界為名觀我應之之實如何爾其所致彼之疑者七事高麗臣屬契丹於朝廷久絶朝貢乃因商舶招諭而來且高麗來與不來於國家固無損益而契丹知之謂朝廷將以圖我一也吐蕃部族不相君長未嘗為邊患而强取其地逮熙河一路殺其老弱以數萬計所費不資契丹聞之當謂行將及我二也邊近西山地勢高仰不可為溏濼向聞遣使部兵遍植榆栁冀其成長以制敵騎昔慶厯慢書所謂創立隄防障塞要路無以異矣三也義勇民兵將校甚整教習亦精而忽創團保甲一道紛然義勇人十去其七破可用之成法得增數之虛名四也河北諸州緣邊近裏城池工築並興增置防城之具檢視衣甲器械五也創都作院頒降弓刀新樣大作戰車此皆衆目所覩諜者易窺費財殫力先自困弊六也置河北三十七將各專軍政州縣不得關預聲言出征又深見可疑之形七也夫契丹素為敵國因事起疑不得不然亦其善自為謀者也今橫使再至初示偃蹇以探伺朝廷况代北初與雄州素有定界若優容而與之敵情無厭浸淫無已不許敵遂持此以為已直縱未大舉勢必漸擾諸邊卒隳盟好臣昔曽言青苗錢事而言者輒肆厚誣非陛下之明幾及大戮自此聞新法日下實避嫌疑不敢論列今親被詔問事係國家安危言及而隱罪不容誅臣嘗竊計始為陛下謀者必曰自祖宗以來因循茍簡治國之本當先富强聚財積穀寓兵于民則可以鞭笞四夷盡復唐之故疆然後制禮作樂以文太平故散青苗錢使民出利又為免役之法次第取錢雖百端補救終求善法此所謂富國之術也又內外置市易務小商細民無措手足加以新制日下更改無嘗官吏茫然不能詳記違者坐徒不以赦降監司督責以刻為明簿法之苛過於告緡今農怨於畎畝商旅歎於道路官吏不安其職恐陛下不盡知也夫欲攘斥四夷以興太平而先使邦本困搖衆心離怨此則陛下始謀者大誤也陛下有堯之仁舜之聰改過不吝聖人之德也而又好進之人不顧國家利害但得邊事將作富貴可圖必曰敵勢已衰特外示驕慢爾以陛下神聖文武若擇將臣領大兵深入邊境則强劃之地一舉可復此又未之思也今河朔纍歲災傷民力大乏緣邊次邊州郡芻糧不充新選將官皆粗勇寡謀之人義勇保甲新㸃未經訓練若驅重兵頓於堅城之下糧道不繼腹背受敵雖曹彬米信名德宿將猶以此致歧溝之敗也臣愚今為陛下計謂宜遣使報聘優致禮幣具言朝廷向來興作乃修備之常與北朝通好之久自古所無豈有它意恐為諜者所誤耳且疆土素定當如舊界請命邊吏退近者侵占之地不可持此造端隳纍世之好永敦信誓兩絶嫌疑望陛下以自見可疑之形如將官之類因而罷去以釋其疑則可以遷延歲月陛下益養民愛力用賢任能疏逺姦諛進用忠鯁天下悅服邊備日充塞下有餘蓄帑中有羡財若果自敗盟誓有衰亂之形然後一振威武恢復故疆快忠義不平之心雪祖宗纍朝之憤矣富韓公疏曰臣五六年來切聞綏州囉瓦熙河辰錦戎瀘交趾咸議用兵或以喪師或以獻馘即時傳播四方而西師初舉便傳必復靈夏既又大傳有人上平燕之䇿契丹必然尋以探知彼復聞朝廷練士馬繕城池利器械聚芻糧加之招致高麗欲為牽制又置河北三十六將事機參合此北人所以先期造釁既發爭端勢未肯已也今釁已成代北各屯兵馬境上爭論逾年未决橫使再至事歸朝廷自當之則恐理難款緩便要可否違之則兵起而患速順之則河東斥堠日蹙雖款目前遺患在後臣謂不若一委邊臣堅持久來圖籍疆界為據使之盡力交相詰難然契丹非不自知理曲蓋欲生事遂興干戈豈是無故驟興實有以致其來也惟陛下深省熟慮不可獨謂北人造釁背盟也惟彼若萬一入寇事不得已我但嚴兵以待之來則禦戰去則備守此自古中興防邊之要也若朝廷乘忿便欲深入討擊臣實慮萬有一跌其害非細或更與西夏為犄角之勢則朝廷宵旰矣事既至此二邊警急數年未得息肩四方凶徒必有觀望者臣願陛下以宗社為憂以生靈為念納汙含垢且求安靜非萬全不舉此天下之願而臣之志也而又喧傳陛下决為親征之謀中外聞之心殞膽落陛下英睿天縱必有成算然太平天子與創業之主事體絶異尤不可慨然輕舉又恐朝廷且作聲勢初無實事若如此乃是我以虛聲而召彼實來也張虛聲者必有疏略之虞作實來者必盡周密之慮成敗豈不灼然假令敵人能得志而還此契丹一種事力素强又有夏國唃厮囉高麗黑水女真韃靼諸蕃為之黨援其勢必難殄滅則繇此結成邊患卒無已時臣竊謂因今橫使之來且可選人以其疑我者數事開懷諭之云凡為武備乃中國常事非欲外興征伐向來用武之地皆小蕃有過者朝廷須當問罪若吾二大邦通好已七十餘年無故安肯輒欲破壞又恐是姦人走作妄興鬬諜因此互相疑二養成釁隙遂有今日爭理如朝廷更有可說之事但盡說之須令釋然無惑乃一助也橫使如不的即遣報聘者於戎主前且道此意庶幾一得必有所益緣彼大藉朝廷歲與方成國計既有憑藉之心豈無安靜之欲只以疑情未釋遂成倔强若與開解明白必肯回心若兩情不通禍患日深必成後悔臣更望陛下兼採博訪不宜專聽一偏恐有迎合聖意及畏避用事之人不敢以實事聞而誤國家大計臣所以及此者竊聞去春久旱陛下時降手詔許人極陳時政得失尋聞上章論列者甚多隨而或遭貶降陛下殊不以手詔召人極陳為意而優容之及令得罪士大夫自此皆務結舌下情不能上達朝政莫大患也願陛下深思極慮早令天下受賜也文潞公曽魯公疏皆主不與之論皆乞選將帥利兵甲以待敵時王荆公再入相曰將欲取之必姑與之也以筆畫其地圖命天章閣待制韓公縝奉使舉與之蓋東西棄地七百餘里云韓公承荆公風㫖視劉公呂公有愧也議者為朝廷惜之嗚呼祖宗故地孰敢以尺寸不入王㑹圖哉荆公輕以畀鄰國又建以與為取之論使帝竟置韓富二公之言不用至後世姦臣以伐燕為神宗遺意卒致天下之亂荆公之罪可勝數哉神宗天資節儉因得老宮人言祖宗時妃嬪公主月俸至微歎其不可及王安石獨曰陛下果能理財雖以天下自奉可也帝始有意主青苗助役之法矣安石之術類如此故呂誨中丞彈章曰外示朴野中懷狡詐聞見録卷四
