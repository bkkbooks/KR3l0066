body:
  text: 聞見録卷二十宋邵伯溫撰熙寧中有一道人無目以錢置手掌中即知正背年號人皆異之康節先公問曰以錢置爾之足亦能知之乎道人答曰此吾師之言也愧謝而去伯溫少時因讀文中子至使諸葛武侯無死禮樂其有興乎因著論以謂武侯霸者之佐恐於禮樂未能興也康節先公見之怒曰汝如武侯猶不可妄論况萬萬相逺乎以武侯之賢安知不能興禮樂也後生輒議先賢亦不韙矣伯溫自此於先達不敢妄論伯溫上世范陽以中直篤實讀書謹禮為家法大父伊川丈人尤質直平生不妄笑語年七十有九以治平四年正月初一日捐館初無疾不食飲水者纍日除夜康節先公以下侍立左右伯溫方七嵗大父鍾愛之亦立其傍大父曰吾及新年往矣康節先公以下皆掩泣大父止之曰吾兒以布衣名動朝廷子孫皆力學孝謹吾瞑目無憾何用哭大父平日喜用大杯飲酒謂康節先公曰酌酒與汝别康節同叔父滿酌大杯以獻大父一舉而盡再酌飲及半氣息微矣謂康節曰吾平生不害物不妄言自度無罪即死以肉祭勿做佛事亂吾教無令吾死婦人手汝兄弟候吾就小殮方令家之人哭勿呌號俾我失路康節先公泣涕以從康節謀葬大父與程正叔先生同卜地於伊川神陰原不盡用葬書大抵以五音擇地以昭穆序葬陰陽拘忌之説皆所不信以是年十月初三日葬開棺大父顔貌如生伯溫尚記之熙寧十年夏康節先生感微疾氣日益耗神日益明笑謂司馬溫公曰某欲觀化一巡如何溫公曰先生未應至此康節先生曰死生常事耳張橫渠先生喜論命來問疾因曰先生論命否當推之康節先公曰若天命則知之世俗所謂命則不知也橫渠曰先生知天命矣某尚何言程伊川曰先生至此他人無以為力願自主張康節先公曰平生學道豈不知此然亦無可主張時康節正寢諸公議後事於外有欲葬近洛城者康節先公已知呼伯溫入曰諸公欲以近城地葬我不可當從伊川先塋耳七月初四日大書詩一章曰生於太平世長於太平世死於太平世客問年幾何六十有七嵗俯仰天地間浩然獨無愧以是夜五更捐館其治命如大父伯溫不敢違先是康節先公每展伊川大父墓中塗上官店必過孝傑殿丞家孝傑從康節先公最早孝傑死有八子康節先公遇之如子姪每過之則迎拜侍立左右甚恭康節先公捐館之年寒食過之謂諸子曰吾再經此與今日異矣諸子不敢問至葬喪車及上官店諸子泣而言之以為異張景觀字臨之學行甚髙康節先公喜之將赴涪州武龍尉告别康節先公泣數行下謂曰吾不見子之歸矣張峋字子堅康節先公於門弟子中謂可語道者赴調京師康節先公愀然色變曰吾老矣不復相見也皆是年之春也嗚呼康節先公所以預知者何止此哉伯溫不肖不能有所述也惟修身俟死下從九原耳尚追憶其遺言以示子孫康節先公與吕微仲丞相不相接先公與橫渠先生張子厚同以熙寧十年丁巳捐館今微仲文集中有和母同州丁巳吟云行髙名並美命否數皆殂嗟爾百君子賢哉二丈夫母方敦薄俗卲堯夫樂道不仕誰復距虛無張子厚論佛老之失望道咸瞪若修梁遽壞乎密章燔漢綬環絰泣秦儒賴有諸良友能令紹不孤為先公與子厚作也蓋河南府以先公訃聞詔贈著作郎諡康節子厚自祕閣病免西歸及長安以殁門人衰服挽車葬橫渠云伯溫獲見公每語先公則悵然有不可及之歎後伯溫初仕長子縣尉公入相元祐改西京國學教授未久公罷政嗚呼亦所以為不孤之惠歟康節先公居洛凡交遊年長者拜之年等者與之為朋友年少者以子弟待之未嘗少異於人故得人之歡心每嵗春二月出四月天漸熱即止八月出十一月天漸寒即止故有詩云時有四不出大風大雨大寒大暑會有四不赴公會葬會生會醵會每出人皆倒屣迎致雖兒童奴𨽻皆知尊奉每到一家子弟家人爭具酒饌問其所欲不復呼姓但名曰吾家先生至也雖閨門骨肉間事有未決者亦求教康節先公以至誠為之開論莫不悅服十餘家如康節先公所居安樂窩起屋以待其來謂之行窩故康節先公殁鄉人挽詩有云春風秋月嬉逰處冷落行窩十二家洛陽風俗之美如此康節先公過士友家晝枕見其枕屏畫小兒迷藏以詩題其上云遂令髙卧人欹枕看兒戲蓋熙寧間也陳恬云擊壤集不載熙寧初歐陽文忠公為參知政事遣其子棐叔弼來洛省王宣徽夫人之疾將行語叔弼曰到洛唯可見邵先生為致吾嚮慕之意康節先生既見叔弼從容以語平生出處以及學術大槩臨别猶曰其無忘鄙野之人於異日後十年康節先公捐館又十年韓康公尹洛請諡於朝叔弼偶為太常博士次當諡議叔弼嘗謂朝説之以道云棐作邵先生諡議皆往昔親聞於先生者當時少年一見欣然延接語以平生學術出處之大故得其詳如此豈非先生學道絶世前知來物預以告耶蓋驗於二十年之後異哉康節先生少時遊京師與國子監直講邵必不疑初敘宗盟不疑年長康節先生以兄拜之蓋不疑自河朔遷丹陽康節先公上世亦河朔人故也至康節自衛入洛不疑為京西提刑嘉祐中河南府薦康節先公以遺逸不疑自作薦章其詞有厚德足以鎮薄俗清風可以遺來世相推重如此熙寧初不疑以龍圗閣學士知成都府過洛謂康節先公曰某陛辭日再薦先生矣康節先公追路洛北别去不疑中途寄康節先生詩云我乘孤傳經崤澠君擁羣書卧洛城富貴人間亦何有間忙趣味甚分明不疑次金牛驛暴卒喪歸康節先公哭之慟女嫁楊國寶應之應之亦康節先公門生康節先公視之猶子也開禧元豐中為河南府推官康節已捐館伯溫復以兄拜之宣和己丑伯溫赴果州道出閬州有知閬中縣邵充美孺者相迎自稱同姓姪云伯溫以宗族源流為問美孺曰充之上世自潤州入蜀龍閣公先人叔父行也伯溫曰康節先公以兄事龍閣公伯溫不敢忘自此與美孺之中外皆論親癸巳伯溫奉使西州美孺居郫嘗至其家拜刑部公廟美孺資和易與人言如恐傷之至臨吏政是非毅然不可奪君子人也丹陽河南成都之邵其次第如此嗟夫世不講宗盟久矣具載之以示三家子孫伯溫之叔父諱睦後祖母楊氏夫人出也少康節先生二十餘嵗力學孝謹事康節如父熙寧元年四月八日暴卒年三十三康節先公哭之慟既卒理其故書得叔父所作重九詩云衣如當日白花似昔年黃擬問東籬事寒香入杳茫及死殯後圃東籬下噫人之死生是果前定矣康節先公既捐館二程先生於伯溫有不孤之意所以教載甚厚宗丞先生謂伯溫曰人之為學忌標凖若循循不已自有所至矣先人敝廬廳後無門由傍舍委曲以出某不便之因鑿壁為門侍講先生見之曰前人規畫必有理不可改作某亟塞之侍講謂周全伯曰邵君雖小事亦相信勇於為善者也某初入仕侍講曰凡作官雖所部公吏有罪立按而後決或出於私怒比具按亦散不至倉卒傷人每決人有未經杖責者宜慎之恐其或有所立也伯溫終身行之熙寧八年秋與士人十餘輩講學於洛陽建春門廣愛寺端像院以待試一夕夢至殿庭唱第望殿上女主也覺謂同舍皆不曉至元祐二年秋以經行薦明年唱名集英殿宣仁太后垂簾聽政也方悟前夢驗於十五年之後果有數矣聞見録卷二十
