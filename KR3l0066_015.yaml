  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0066_WYG_015-1a, image: WYG1038/WYG1038-0800c.png}
body:
  text: 聞見録卷十五宋邵伯溫撰程宗丞先生名皓字伯淳弟侍講先生名頤字正叔康節先公以兄事其父太中公二先生皆從康節遊其師曰周敦頤茂叔宗丞為人清和侍講為人嚴峻每康節議論宗丞心相契苦無所問侍講則時有往復故康節嘗謂宗丞曰子非助我者然相知之盡二先生則同也橫渠張先生名載字子厚弟戩字天祺為二程先生之表叔子厚少豪其才欲結客取熙河􅙉鄯之地范文正公帥延安聞之館於府第俾修制科與天祺皆登進士第方同二程先生修中庸大學之道尤深於禮熙寧初子厚為崇文院校書天祺與伯淳同為監察御史時介甫行新法伯淳自條例司官為御史與臺諌官論其不便俱罷上猶主伯淳介甫亦不深怒之除京西北路提點伯淳力辭乞與同列俱貶改澶州簽判天祺尤不屈一日至政事堂言新法不便介甫不答以扇障面而笑天祺怒曰參政笑某不知天下人笑參政也趙清獻公同參大政從旁解之天祺曰公亦不可謂無罪清獻有愧色謫監鳳翔府司竹監舉家不食筍其清如此未幾卒於官子厚亦求去熙寧十年吳亢丞相當國復召還館康節已病子厚知醫亦喜談命診康節脈曰先生之疾無慮又曰頗信命否康節曰天命某自知之世俗所謂命某不知也子厚曰先生知天命矣尚何言子厚入館數月以病歸過洛康節已捐館折簡慰撫伯溫勤甚見二程先生曰某之病必不起尚可及長安也行至臨潼縣沐浴更衣而寢及旦視之亡矣門生衰絰挽車葬鳳翔之橫渠是謂橫渠先生伯淳自澶州請監洛河竹木務以便親除判武學未赴以中丞李定言罷知開封府扶溝縣失囚謫汝州監酒元祐初以宗正丞召將大用未赴卒葬伊川文潞公表其墓曰明道先生正叔元祐初用司馬溫公吕申公薦召對初除職官再除館職除崇政殿説書嵗餘出判西京國子監兩除直祕閣不拜紹聖中坐元祐黨謫涪州遇上皇即位赦得歸久之復官以卒是謂伊川先生三先生俱從康節遊康節尤喜明道其譽之與富韓公司馬溫公吕申公相等故康節四賢詩云彥國之言鋪陳晦叔之言簡當君實之言優遊伯淳之言調暢四賢洛之觀望是以在人之上有宋熙寧之間大為一時之壯則康節之所以處明道者盛矣一日二程先生侍太中公訪康節於天津之廬康節擕酒飲月陂上歡甚語其平生學術出處之大明日悵然謂門生周純明曰昨從堯夫先生遊聽其論議振古之豪傑也惜無所用於世純明曰所言何如明道曰內聖外王之道也是日康節有詩云草軟波平風細溜雲輕日淡柳低摧狂言不記道何事劇飲未嘗如此杯好景只知間信步朋歡那覺大開懷必期快作賞心事却恐賞心難便來明道和云先生相與賞西街小子親擕几杖來行處每容參劇論坐隅還許瀝餘杯檻前流水心同樂林外青山眼重開時泰心間兩難得直須乘興數追陪明道敬禮康節如此故康節之葬伯溫獨請志其墓焉悲夫先生長者已盡其遺言尚存伯溫自念暮景可傷不可使後生無聞也因具載之元符末吕惠卿罷延安帥陸師閔代之有訴惠卿多以人冒功賞者師閔以其事付有司未竟罷去曾布為樞密使素與惠卿有隙特自太原移德孺延安蓋德孺於惠卿亦有隙也德孺至取其事自治有自皇城使追奪至小使臣者德孺由是大失邊將之心議者謂其詞於前政事已在有司德孺乃取以自治失矣德孺聰明過人而為曾布所使惜哉未幾德孺亦以論役法罷如忠宣丞相則不然公帥慶陽時為總管种詁無故訟於朝上遣御史按治詁停任公亦罷帥至公樞密副使詁尚停任復薦為永興軍路鈐轄又薦知隰州公每自咎曰先人與种氏上世有契義某不肖為其子孫所訟寧論事之曲直哉嗚呼可謂以德報怨者也以德孺之賢於是乎有愧於忠宣矣田畫者字承君陽翟人故樞密宣簡公姪也其人物雄偉議論慷慨俱有前輩之風鄒浩志完者教授潁昌與承君遊相樂也浩性懦因得承君故遇事輒自激勵元符間承君監京城門一日報上召志完承君為之喜又一日報志完賜對承君益喜監門法不許出志完亦不來久之志完除言官承君始望志完矣志完遣客見承君以測其意客問承君近讀何書承君曰吾作墨子詩有知君既得雲梯後應悔當年泣染絲之句為鄒志完發也客言於志完志完折簡謝承君辭甚苦因約相見承君曰斯人尚有所畏未可絶也取告見之問志完曰平生與君相許者何如今君為何官志完愧謝曰上遇羣臣未嘗假以聲色獨於某若相喜者今天下事故不勝言意欲待上益相信而後發貴有益也承君許之既而朋黨之禍大起時事日變更承君謝病歸陽翟田舍一日報廢皇后孟氏立劉氏為皇后承君告諸子曰志完不言可以絶交矣又一日志完以書約承君會潁昌中塗承君喜甚亟往志完具言諫廢立皇后時某之言戅矣上初不怒也某因奏曰臣即死不復望清光矣下殿拜辭以去至殿門望上猶未興凝然若有所思也明日某得罪志完承君相留三日臨别志完出涕承君正色責曰使志完隱默官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君無以此舉自滿士所當為者未止此也志完茫然自失歎息曰君之贈我厚矣乃别去建中靖國初承君入為大宗丞宰相曾布欲收置門下不能屈除提舉常平亦辭請知淮陽軍以去吏民畏愛之嵗大疫承君日自挾醫戶問病者藥之良勤一日小疾不出正晝一軍之人盡見承君擁騎從騰空而去就問之死矣或曰為淮陽土神云儒釋之道雖不同而非特立之士不足以名其家近時伯溫聞見者二人大儒伊川先生程正叔元祐初用司馬溫公薦侍講禁中時哲宗幼沖先生以師道自居後出判西京國子監兩加直祕閣皆辭之黨禍起謫涪州先生注周易與門弟子講學不以為憂遇赦得歸不以為喜長老道楷者崇寧中以朝廷命住京師法雲寺上一日賜紫方袍及禪師號楷曰非吾法也却不受中使譖於上以為道楷擲敇於地上怒下大理寺杖之理官知楷為有道者欲出之問曰師年七十乎曰六十九矣有疾乎楷正色曰某平生無病上賜杖官不可輒輕之遂受杖無一言自此隱沂州芙蓉溪從之者益盛朝廷數有旨復命為僧不從嗚呼二人者雖學不同皆特立之士也為僧為釋而不以道者聞其風可以少愧矣程伯淳先生嘗曰熙寧初王介甫行新法並用君子小人君子正直不合介甫以為俗學不通世務斥去小人苟容諂佞介甫以為有材能知變通用之君子如司馬君實不拜同知樞密院以去范堯夫辭同修起居注得罪張天祺自監察御史面折介甫被謫介甫性狠愎衆人以為不可則執之愈堅君子既去所用皆小人爭為刻薄故害天下愈深使衆君子未用與之敵俟其勢久自緩委曲平章尚有聽從之理但小人無隙以乘其為害不至此之甚也天下以先生為知言陳瓘字瑩中閩人有學問年十八登進士甲科紹聖初用章惇薦為太學博士先是惇之妻嘗勸惇無修怨惇作相専務報復首起朋黨之禍惇妻死惇悼念不堪瑩中見惇容甚哀謂惇曰公與其無益悲傷曷若念夫人平生之言蓋譏惇之報怨也惇以為忤不復用曾布為相薦瑩中為諫官為都司蔡卞據王安石日録改修神宗實録曾布亦主熙寧元豐之政瑩中上布書講示尊私史以壓宗廟及論時政之不當時布又以為忤出之瑩中為諫官時為上皇極言蔡京蔡卞不可用用之決亂天下蔡京深恨之屢竄責例用赦放歸猶𨽻通州一日瑩中之子走京師言蔡京事詔下獄明州捕瑩中甚急士民哭送之瑩中不為動既入獄見其子被繫笑曰不肖子煩吾蔡京用酷吏李孝夀治其事孝夀坐廳事簾中列五木於庭引瑩中問之瑩中從容曰蔡京之罪某實知之不肖子不知也多求紙自書孝夀懼以瑩中為不知情即日放歸再𨽻通州其子配海上瑩中撰尊堯集以辨王安石妄作日録以詆祖宗詆神宗者今行於世靖康初不及大用以死特贈諫議大夫瑩中晚喜康節先生之學嘗從伯溫求遺書曰吾於康節之學若有得也伯溫紹聖初監永興軍錢監吕晉伯龍圖居里第數見之深蒙器愛伯溫罷官貧不能歸用茶司薦為屬官一日見吕公公曰君亦為此官何耶選人作諸司屬官使臣為走馬承受則一生不可作他官矣伯溫對以故公曰為親為貧則可也公丞相汲公之兄性剛直謹禮法為從官歸鄉見縣令必致桑梓之恭待部吏如子弟多面折其短而樂於成人雖丞相亦未嘗少假顔色也一日至府第坐堂上丞相夫人拜庭下命二婢子掖之公怒曰人以為丞相夫人吾但知吕二郎新婦耳不疾病輒用人扶何也丞相為之愧謝乃已每勸丞相辭位以避滿盈之禍紹聖中丞相南遷公帥平涼議邊事不合移帥秦又與鍾傳議不合亦忤章惇降待制知同州致仕復龍圖閣直學士嗚呼吕公今之古人也伯溫尚及見之記其平生之言如此本朝古文柳開仲塗穆修伯長首為之唱尹洙師魯兄弟繼其後歐陽文忠公早工偶儷之文故試於國學南省皆為天下第一既擢甲科官河南始得師魯乃出韓退之文學之公之自敘云爾蓋公與師魯於文雖不同公為古文則居師魯後也如五代史公嘗與師魯約分撰故公謫夷陵日貽師魯書曰開正以來始似無事始舊更前嵗所作十國志蓋是進本務要卷多今若便為正史盡合刪削存其大者細小之事雖有可紀非干大體自可存之小説不足以纍正史數日撿舊本因盡刪去矣十亦去其三四師魯所撰在京師時不曾細看路中細讀乃大好師魯素以史筆自負果然河東一傳大妙修本所取法於此傳亦有繁簡未中者願師魯刪之則盡善也正史更不分五史通為紀傳今欲將梁紀並漢周修且試撰以唐晉師魯為之如前嵗之議其他列傳約略且將逐代功臣隨紀各自撰傳待續次盡將五代列傳姓名寫出分為二分手作傳不知如此於師魯如何吾輩棄於時聊欲因此粗伸其志少希後世之名如修者幸與師魯相依若成此書亦是榮事今特告朱公遣此介奉咨希一報如何便各下手只候任進歸便令賫國志草本去次云云其後師魯死無子今歐陽公五代史頒之學官盛行於世內果有師魯之文乎抑歐陽公盡為之也歐陽公志師魯墓論其文曰簡而有法公曰在孔子六經中唯春秋可當則歐陽於師魯不薄矣崇寧間改修神宗正史歐陽公傳乃云同時有尹洙者亦為古文然洙之才不足以望修云蓋史官皆晚學小生不知前輩文字淵源自有次第也聞見録卷十五
