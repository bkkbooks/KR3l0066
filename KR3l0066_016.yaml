body:
  text: 聞見録卷十六宋邵伯溫撰楊凝式少師唐昭宗朝為直史館宰相涉之子也朱全忠逼唐禪位涉為奉𫝊國寶使凝式曰大人為唐宰相使國家至此不可為無過況乎持天子璽綬與人雖保富貴奈千載何盍辭之涉大駭曰汝欲滅吾族神色不寧者數日全忠既篡弒凝式歷梁唐晉三朝陽狂不任事纍官至太子少師其書法自顔柳以入二王之妙居洛陽延福坊每出導從輿馬在前多行於後一日欲遊天官寺從者曰曷往廣受寺亦從之今兩寺與多寶塔院有遺像尚存近嵗劉壽臣為留臺於故按牘中得少師自書假牒十數紙皆楷法精絶世論少師書以行草為長誤矣國初隱士石砒居洛陽之北邙山馮拯侍中為留守砒每騎驢直造侍中見必拜之飲酒至醉乃去砒好作詩多道家語有曰結網蜘蛛翻仰肚轉枝啄木倒垂頭意謂謀利者如此又曰蝸牛角上爭間事石火光中寄此身意謂好利者若此洛人頗能誦之一日自城中飲酒大醉騎驢夜歸失所在孫覺龍圖未第時家髙郵與士大夫講學於郊宫别墅一夕晦夜忽月光入窗隙孫異之與同舍望光所在行二十里餘見大珠浮遊湖面上其光燭天旁照逺近有崔伯易者作感珠賦記之熙寧初孫登科為河南縣主簿自云周長孺字士彥澶淵人楊置榜登第為渭州共城縣令師得曰邵康節先生士彥事先生以古弟子禮先生告以先天之學士彥性剛遇事輒發既從先生即淡然若無意於世者其季直孺怪問之士彥慨然曰此吾得於先生者士彥在共城獵近郊有兔起草間自射中之即其處不復見兔石刻其文曰士彥當都而卒後士彥每至京師必遽歸不敢留治平末以都官員外郎知劒州普城縣卒喪歸過洛貧不能行康節留其家經紀甚備教其子純明以學問為娶程伊川先生之姪純明後登元祐三年進士第士彥因獵得石刻驗於數十年之後與漢滕公佳城事相類異哉張唐英者天覺丞相兄也丞相少受學於唐英唐英有史才嘗作宋名臣𫝊蜀檮杌行於代熙寧元年春以前御史服除還京朝過洛府尹同僚屬出賞花皆不見唐英題詩𫝊舍云先帝昭陵土未乾又聞永厚葬衣冠小臣有淚皆成血忍向東風看牡丹尹聞之遽遣書為禮却而不受蓋仁宗山陵初成英宗厭代賴唐英還朝不得歸臺不然河南尹者不免矣皇祐初洛陽南資福院有僧録義琛者素出入尹師魯門下師魯自平涼帥謫崇信軍節度副使均州監酒過洛義琛見之曰鄉里門徒數人欲一望見龍圖有頃諸人出一喏而去皆洛中大豪義琛已密約貸錢為師魯買洛城南宫南村負郭美田三十頃師魯初不知后義琛復以嵗所得地利償諸人至師魯卒喪歸洛義琛哭柩前納其劵於師魯家師魯素貧子孫賴此以生嗚呼在仁宗朝一僧尚負義如此風俗可謂厚矣康節先生與義琛善每稱之也陜西豪士劉易多遊邊喜談兵寶元康定間韓魏公宣撫五路薦於朝賜處士號易善作詩魏公為書或不可其意則發怒洗去魏公欣然再書不憚尹師魯帥平涼延易府第尊禮之狄武襄代師魯遇之亦厚每燕設易嗜食苦馬菜不得即叫怒無禮邊城無之狄公為求於內郡后每燕集終日唯以此菜啖之易不能堪方設常饌時稱狄公善制也謝希深幼子景平初任為大理評事監光化軍稅有兵官者為本㕔軍員持以事兵官常憂鬱不樂景平一日問之兵官泣訴景平曰君當解官去吾必能報之兵官去景平因權軍事呼軍員詰之曰老兵何敢持兵官使罷任去軍員者無賴大言曰景平但可飲酒擊鞠耳此事不當預景平以犯階級送獄獄成決配之希深一時有大名其諸子皆賢景平居幼尚有家風云祖無擇字擇之蔡州人少從穆伯長為古文后登甲科嘉祐中與王介甫同為知制誥擇之為先進時詞臣許受潤筆物介甫因辭一人之饋不獲義不受以其物置舍人院梁上介甫以母憂去擇之取為本院公用介甫聞而惡之以為不廉熙寧二年介甫入為翰林學士拜參知政事權傾天下時擇之以龍圖閣學士右諫議大夫知杭州介甫密諭監司求擇之罪監司承風旨以贓濫聞於朝廷遣御史王子韶按治子韶小人也攝擇之下獄鍛鍊無所得坐送賔客酒三百小瓶責節度副使安置元豐中復祕書監集賢院學士移知光化軍以卒士大夫寃之同時有知明州光祿卿苗振監司亦因觀望發其贓罪朝廷遣崇文院校書張載按治載字子厚所謂橫渠先生者悉平反之罪止罰金其幸不幸有若此者也嘉祐中有李殿丞者知濟源縣魏廣者主簿汜水人二人素相好一日㑹府中李被酒謂廣曰我果官達當薦君為屬未幾河南倅闕李又攝之遂檄廣權幕官相從益歡監司以燕㑹數俱罷歸故官廣先去李餞於東門席上賦詩有曰今日不知明日事人情反復似車輪我今自是飄萍客更向長亭作主人蓋當時朝廷文法寬所用監司皆長者故能容州縣之吏如此任道司門為康節先生云薛俅肅之為梓州路提刑市有道人賣兔毫筆者以蜀中所無也因呼之見其目光射人因問其所得絶不言而去道中為余言如此道中名元實有禮學嘗為尚書郎其為人忠信不妄云長安百姓常安民以鐫字為業多收隋唐銘志墨本亦能篆教其子以儒學崇寧初蔡京蔡卞為元祐姦黨籍上皇親書刻石立於文德殿門又自書頒於天下州治㕔事長安當立召安民刋字民辭曰民愚人不知朝廷立碑之意但元祐大臣如司馬相公者天下稱其正直今謂之姦邪民不忍鐫也府官怒欲罪之民曰被役不敢辭乞免刻安民二字於碑恐後世並以為罪也嗚呼安民者一工匠耳尚知邪正畏過惡賢於士大夫逺矣故余以表出之聞見録卷十六
