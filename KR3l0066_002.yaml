  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0066_WYG_002-1a, image: WYG1038/WYG1038-0722c.png}
body:
  text: 聞見録卷二宋邵伯溫撰仁宗好用道引術理髮有宮人能之號曰梳頭夫人一日帝退朝命夫人理髮嬪御列侍帝袖中有章疏左右爭取之帝不能止有從旁讀者蓋臺臣乞放宮女章也衆聞之默然獨梳頭夫人歎息曰今京師富人尚求妾媵豈有天子嬪御外臣敢以為言官家亟逐言者則清淨矣帝不語既御膳幸後苑命內侍按宮人籍上自出若干人行臺臣之言也梳頭夫人以入宮久首出之帝亦不問或謂參知政事吳奎曰上比漢文帝奎對以此則曰過文帝逺矣仁宗朝程文簡公判大名府時府兵有肉生於背蜿蜒若龍伏者文簡收禁之以其事聞仁宗謂宰輔曰此何罪也令釋之後其兵以病死嗚呼肉龍生於兵之背妖也帝釋之德足以勝妖矣兵輒死宜哉孫文懿公為翰林學士撰升袝李太后赦文曰章懿太后丕擁慶羡實生眇冲顧復之恩深保綏之念重神馭既往仙遊斯邈嗟乎為天下之母育天下之君不逮乎九重之承顔不及乎四海之致養念言一至追慕增結仁宗覽之感泣彌月公自此遂參大政帝問文懿曰卿何故能道朕心中事公曰臣少以庶子不齒於兄弟不及養母以此知陛下聖心中事上為之流涕先是晏元獻公撰章懿太后神道碑曰五嶽崢嶸崑山出玉四溟浩渺麗水生金蓋以明肅太后為尊也學士大夫嘉其善比獨仁宗不悅伯溫嘗得老僧海妙者言仁宗朝因赴內道場夜聞樂聲出雲霄間帝忽來臨觀久之顧左右曰衆僧各賜紫羅一匹僧致謝帝曰來日出東華門以羅置懷中勿令人見恐臺諫有文字論列嗚呼仁宗以微物賜僧尚畏言者此所以致太平也海妙又言嘗觀仁宗二十許嵗時祀南郊回坐金輦中日初出面色與金光相射真天人也因以記之仁宗一日幸張貴妃閣見定州紅瓷器帝堅問曰安得此物妃以王拱辰所獻為對帝怒曰嘗戒汝勿通臣僚饋送不聽何也因以所持拄斧碎之妃愧謝久之乃已妃又嘗侍上元宴於端門服所謂燈籠錦者上亦怪問妃曰文彥博以陛下眷妾故有此獻上終不樂後潞公入為宰相臺官唐介言其過及燈籠錦事介雖以對上失體逺謫潞公尋亦出判許州蓋上兩罷之也或云燈籠錦者潞公夫人遺張貴妃公不知也唐公之章與梅聖俞書竄之詩過矣嗚呼仁宗寵遇貴妃先於六宮其責以正禮尚如此可謂聖矣仁宗朝王安石為知制誥一日賞花釣魚宴內侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也帝不樂之後安石自著日録厭薄祖宗於仁宗尤甚每稱漢武帝其心薄仁宗也故一時大臣富弼韓琦文彥博皆為其詆毁云仁宗時一日天大雷震帝衣冠焚香再拜退坐靜思所以致變者不可得偶後苑作匠進一七寶枕屏遽取碎之嗚呼帝敬天之威如此其當太平盛時享國長久宜矣至熙寧大臣以天變不足畏說人主以成今日之禍悲夫仁宗御馬有名玉逍遙者馬色白其乘之安如輿輦也圉人云馬行步有尺度徐疾皆中節馭者行速則以足攔之一日燕王借乘即長鳴不行王怒還之帝父事王甚恭配南城馬鋪久之復奉御其行如初帝升遐從葬至陵下悲鳴不食而斃伊川先生程頤謂伯溫曰驥不稱其力稱其德也歟本朝祖宗以來進士過省赴殿試尚有被黜者逺方寒士殿試下貧不能歸多至失所有赴河而死者仁宗聞之惻然自此殿試不黜落雖雜犯亦收之末名為定制可以謂之仁矣仁宗至和間不豫昏不知人者三日既愈自言夢行荆棘中周章失路有神人被金甲自天而下謂帝曰天以陛下有仁心錫一紀之夀帝曰吾何當歸神人曰請以臣之車輅相送帝登車問神人何人曰臣所謂葛將軍者帝寤令檢案道藏果有葛將軍主天門事因增其位號於大醮儀中立廟京師帝自此御朝即拱默不言大臣奏事可即肯首不即搖首而時和歲豐百姓安樂四夷賓服天下無事蓋帝知為治之要任宰輔用臺諫畏天愛民守祖宗法度時宰輔曰富弼韓琦文彥博臺諫曰唐介包拯司馬光范鎮呂誨云嗚呼視周之成康漢之文景無所不及有過之者此所以為有宋之盛歟仁宗初納光獻后后有疾國醫不效帝曰后在家用何人醫后曰妾隨叔父官河陽有疾服孫用和藥輒效尋召用和服其藥果驗自布衣除尚藥奉御用和自此進用用和本衛人以避事客河陽善用張仲景法治傷寒名聞天下二子奇兆皆登進士第為朝官亦善醫仁宗初升遐禁中永昌郡夫人翁氏㑹有私身韓蠱者自言嘗汲水仁宗見龍繞其身因幸之留其釧復遺以物為驗遂稱有娠既踰期不産按驗皆蠱之詐得其釧於佛閣土中乃蠱自埋也翁氏削一資杖韓蠱配尼寺為童初執政請誅之光獻太后曰置蠱於尼寺欲令外人盡知其詐若殺之則必謂蠱實生子也英宗初載光獻后垂簾同聽政其决事之明類如此仁宗皇帝嘉祐八年三月二十九日升遐遺詔到洛伯溫時年七嵗尚記城中軍民以至婦人孺子朝夕東向號泣紙烟蔽空天日無光時舅氏王元修自京師過洛為先公言京師罷市巷哭數日不絶雖乞丏者與小兒皆焚紙錢哭於大內之前又有周長孺都官赴劒州普安知縣行亂山中見汲水婦人亦載白紙行哭嗚呼此所謂百姓如喪考妣者歟熙寧初仁宗幼女下嫁錢景臻京師父老知其為仁宗女也隨其車咨嗟泣涕元祐中契丹主謂本朝使人曰寡人年少時事大國之禮或未至蒙仁宗加意優容念無以為報自仁宗升遐本朝奉其御容如祖宗已而泣蓋北主為太子時雜入國使人中雄州密以聞仁宗召入禁中俾見皇后待以厚禮臨歸撫之曰與汝一家也異日惟盟好是念生靈是愛故北主感之嗚呼帝上賓既久都人與北主追慕猶不忘此前代所無也英宗山陵有輦官畢達哭慟於仁宗永昭陵下曰臣事陛下四十餘年得服役天上死不恨是夕達暴卒韓魏公為司馬溫公云永安霍道全者嘗為三陵壕寨年踰九十坐丁謂移永定陵皇堂事羈管亳州道全言地中宿藏物多驗亳人神之遇赦歸永安嘉祐七年道全忽歷遍川原觀地形語人曰此地將有大役明年仁宗升遐初卜陵有司召問之道全曰今永安地吉宜徙以為陵寢有司疑其欲騷動縣人凡所言皆不用道全亦相繼卒今永昭陵既成或曰地名和兒原非佳兆後三年英宗晏駕元豐中神宗倣漢原廟之制增築景靈宮先於寺觀迎諸帝后御容奉安禁中涓日以次備法駕羽衛前導赴宮觀者夾路鼓吹振作教坊使丁仙現舞望仁宗御像引袖障面若揮淚者都人父老皆泣下嗚呼帝之德澤在人深矣聞見録卷二
