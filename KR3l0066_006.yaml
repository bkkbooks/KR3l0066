body:
  text: 聞見録卷六宋邵伯溫撰伯溫崇寧中居洛因過仁王僧舎得葉子册故書一編有趙普中書令雍熙三年為鄧州節度使日諫太宗皇帝伐燕疏與劄子各一道其憂國愛君之深言出乎文章之外者雖雜陸宣公論事中不辨也疏曰武勝軍節度使臣趙普右臣自二月中伏覩忽降使臣差船糧草及詳教命知取幽州既奉指揮尋行科配非時舉動莫測因繇爾後雖聽㨗音未聞成事稍稽尅復俄及炎蒸飛芻輓粟以猶繁擐甲持戈而未已民疲師老漸恐有之臣自此月以來轉増疑慮潛思陛下萬幾在念百姓為心聖略神功舉無遺算至於平收浙右力取河東垂後代之英奇雪前朝之憤氣四海咸歸於掌握十年時致於雍熙唯彼蕃戎豈為敵對遷徙鳥舉自古難得制之前代聖帝明王無不置於化外任其追逐水草皆以不治治之此際官家何須掛意必是有人扶同謟佞誑惑聰明因舉不急之兵稍渉無名之議非論曲直但覺淹延將成六月之征頗有千金之費以兹忖度深抱憂虞竊念臣雖寡智謀粗親墳典千古興亡之理得自簡編百王善惡之徵聞於經史其間禍淫福善莫不如影隨形煥若丹青明如日月嘗為大訓歴代寳之臣讀史記見漢武帝時主父偃徐樂嚴安輩所上書及唐𤣥宗時宰相姚元崇直奏十事可以坐銷患害立致昇平惟慮至尊未能留意醫時救弊無出於斯又聞前事為後事之師古人是今人之則據其年代雖即不同量彼是非必然無異輒思抄録專具進呈伏望聖慈特垂披覽謹具逐件如後云云伏念臣謬以庸材叨居顯位幸遇千年之運深承二聖之知從白屋而上青霄非繇智略出卑僚而登極位只是遭逢恩私何啻於車魚報效不如於犬馬粗懷性識嘗積驚惶所恨者齒髮衰殘精神減耗既不能獻謀闕下又不能效命軍前惟有微誠書章上奏今者伏自朝廷大興禁旅逺伐山戎驅百萬户之生靈咸當輦運致數十州之地土半失耕桑則何異為鼷鼠而發機將明珠而彈雀所得者少所失者多只於得少之中尤難入手更向失多之外别有關心前未見於便宜可垂興於詳酌臣又聞聖人不凝滯於物見可而進知難而退理有變通情無拘執故前所謂事久則慮易兵久則變生臣之愚誠深懼於此秦始皇之拒諫終累子孫漢武帝之囘心轉延宗社如忽遲晚恐失機宜而况旬朔之間便為一月竊慮内地先困邊廷荒凉北敵則弓硬馬肥轉難擒制中國則民疲師老應誤指呼臣今獨興沮衆之言深負彌天之過輒陳狂瞽抑有其繇竊以暮景殘光能餘幾日酬恩報義正在今時恐勞宵旰之憂寧避僭踰之罪䖍希聖德早議抽軍聊為一縱之謀别有萬全之䇿伏望皇帝陛下安和寢饍惠養疲羸長令户外不扃永使邊烽罷警自然殊方慕化率土歸仁既四夷以來王料契丹而安往又何必勞民動衆賣犢買刀有道之事易行無為之功最大如斯弔伐是又萬全臣又竊料陛下非次興兵恐因偏聽其奈人多獻佞事久陽微大凡小輩各務身謀誰思國計或承宣問皆不實言盡解欺君嘗憂敗事得之則奸邪獲利失之則社稷懷憂昨者直取幽州未審誰為謀者必無成算俱是誑言其於虚實之間此際總應彰露臣既不知頭主無以指射姓名伏望官家尋其尤者特正姦人之罪免傷聖主之明所貴詐偽悛心忠臣盡力共畏三千之法同堅八百之基臣於此時欲吐肺肝先寒毛髮驚疑猶豫數日沉思又念往哲臨終尚能屍諫微臣未死爭忍面諛明知逆耳之言不是全身之計但縁恩同卵翼命直鴻毛將酬國士之知豈比衆人之報投荒棄市甘當此日之誅竊禄偷安不造来生之業惟祈聖明特賜察量更存細微别具劄子冐犯冕旒臣無任傾心瀝懇憂國忘家涕泗徬徨激切屏營之至其劄子曰臣濫守藩方聊知稼穡竊見當州管界承前多是荒凉户小民貧程遥路僻量其境土五縣中四縣居山驗彼人家三分内二分是客昨來差配甚覺艱辛伏縁在此直至莫州來往四千餘里或是無丁有稅須至雇人般量每㪷雇召之資賤者不下五百元配二萬石數約破十萬貫錢直如夲户自行費用無多所較乃是二萬家之貧户出此十萬貫之見錢所以典業費牛十間六七其間兼有鬻男女者亦有弃性命者仍如善誘偶副嚴期自從起發去來已及八十餘日近知内有人户衷私却到鄉村皆云裝起軍糧未有送納去處縁無口食再取盤纏雖不辨其真虚又難行於本覆訪聞街坊竊議前後説得多般稱被契丹圍却軍都兼被劫糧草及令尋勘皆却隱藏葢縁臣無以知軍前事宜只聽得外面消息况九重密事應不泄於朝廷奈何百姓流言已相傳於道路詳其住滯必有艱難伏乞聖慈平令停罷更或遲久轉費糧儲潜思今日人情不可再行差配如或再行徭役决定廣有逃移假令收下幽州邊境轉廣干戈未息忽然生事未見理長必因有僭濫之徒姦邪之黨但說契丹時逢幼主地有災星以此為詞曲中聖㫖不審戎情上下幽州俱致其生涯土宿照臨外處不可以征討若彼能同衆意縱幼主以難輕不順羣情無災星而亦敗誠宜守道事費無私如樂禍以求功竊慮得之而不武此蓋兩省少昌言之士靈臺無有藝之人而况補闕拾遺合專司於規諫天文歴算須預定於吉凶成兹誤失之繇各負疎遺之罪若無愆責何戒後來一臣縁久居近職備見人情至於後殿三班前朝百辟文武雖異是非略同纔奉委差便思僥倖雖詢利害各避嫌疑而况毁譽生心貪求恣意扶同狂妄率以為常其間久歴事者明知而佯作不知初為官者不㑹而仍兼詐㑹多非允當少得純良而又凡關宣敕委差便是帝王心腹方資視聽切要精詳就中同軍不同閒事必料曹使沿邊相度往返叅詳不知能有幾人應得當時言語如今比較並見直虚乞誅罔上之輩流便作抽軍之題目自此則潛消媚佞免誤朝廷唯此區分以為激勸一唯有勾抽不同舉發一則我無鬬志一則彼有讎心而况契丹懷吞并之心恃戎馬之力垂慈恕捨却慮追奔須作隄防免輸奸便伏乞皇帝陛下密授成算遐宣睿謀但令硬弩長槍周施禦捍前歌後舞小作程途縱逼交鋒何憂乏力只應信宿尋達城池便可使戰士解鞍且作防邊之旅耕夫歸舎重為樂業之人是知多難興王已垂芳於往昔從諫則聖宜頌美於當今此事既行天下幸甚一臣今將本末細具敷陳嘗思發跡之繇實有殊常之幸其於際遇近代無倫伏自宣宗皇帝滁州不安之時臣蒙召入臥内昭憲太后在宅寢疾之日陛下喚至牀前念以傾心皆曽執手溫存撫諭不異家人惟懐竭節盡忠以至變家為國慙虧德望有此遭逢先皇開創之初尋居密地陛下纂承之後再入中書蒙二聖之深知當兩朝之大用不惟此世應繫前生禮雖限於君臣恩實同於骨肉是以凡開啓沃罔避危亡蓋縁每認陛下本是天人暫來人世是以生知福業性稟仁慈潛聞内裏看經盤中戒肉今者願忍一朝之忿嘗隆萬劫之因如或未止干戈必恐漸多殺害即因民愁未定戰勢方揺仍於夢幻之中大作煩勞之事是何微類誤我至尊乞明驗於奸人願不容於首惡興言及此涕淚交流又念臣雖寡智謀實同榮辱都縁意切不覺辭煩冒犯宸嚴不勝戰越其疏與國史所載大略相似有不同者劄子則惟見於此太宗晚喜佛中令因其所喜以諫云伯溫竊聞太祖一日以幽燕地圖示中令問所取幽燕之䇿中令曰圖必出曹翰帝曰然又曰翰可取否中令曰翰可取孰可守帝曰以翰守之中令曰翰死孰可代帝不語久之曰卿可謂逺慮矣帝自此絶口不言伐燕至太宗因平河東乘勝欲搗燕薊時中令鎮鄧州故有是奏帝下詔褒其言嗚呼中令從祖宗定天下尚以取幽燕為難近時小人竊大臣之位者乃建結女真滅大遼取幽薊之議卒致天下之亂悲夫王晉公祐事太祖為知制誥太祖遣使魏州以便宜付之告之曰使還與卿王溥官職時溥為相也蓋魏州節度使符彦卿太宗夫人之父有飛語聞於上祐往别太宗於晉邸太宗郤左右欲與之言祐徑趨出祐至魏得彦卿家僮二人挾勢恣横以便宜決配而已及還朝太祖問曰汝敢保符彦卿無異意乎祐曰臣與符彦卿家各百口願以臣之家保符彦卿家又曰五代之君多因猜忌殺無辜故享國不長願陛下以為戒帝怒其語直貶䕶國軍行軍司馬葉州安置七年不召太宗即位謂輔臣曰王祐文章之外别有清節朕所自知以兵部侍郎召不及見而薨初祐笑曰某不做兒子二郎必做二郎者文正公旦也祐素知其必貴手植三槐於庭曰吾子孫必有為三公者已而果然天下謂之三槐王氏國初趙普中令為相於㕔事坐屏後置二大甕凡有人投利害文字皆置中滿即梴於通衢李沆文靖為相當太平之際凡建議務更張喜激昻者一切不用曰以報國耳嗚呼賢相思慮逺矣至熙寧初王荆公為相寢食不暇置條例司潛論天下利害賢不肖雜用賢者不合而去不肖者嗜利獨留盡變更祖宗法度天下紛然以致今日之亂益知趙中令李文靖得為相之體也太宗一日謂宰輔曰朕如何唐太宗衆人皆曰陛下堯舜也何太宗可比丞相文正公李昉獨無言徐誦白樂天詩云怨女三千放出宮死囚八百來歸獄太宗曰朕不如也神宗序溫公資治通鑑曰若唐之太宗孔子所謂禹吾無間焉者神宗可謂無愧於太宗矣至召見王荆公首建每事堯舜之論神宗信之荆公與其黨始務為高大之說至厭薄祖宗以為不足法况唐之太宗乎文正公之言可拜也真宗不豫大漸之夕李文定公與宰執以祈禳宿内殿時仁宗幼冲八大王元儼者有威名以問疾留禁中累日不肯出執政患之無以為計偶翰林司以金盂貯熟水曰王所須也文定取案上墨筆攪水中水盡黒令持去王見之大驚意其有毒也即上馬去文定臨事大率類此太祖既下江南以賈黄中知金陵一日黄中按行府第見庫舎扃鐍甚嚴集僚吏發之得寳貨數十巨櫝皆李氏宮闈之物不𨽻於籍者黄中悉表上之太祖歎曰吾府庫之物有籍貪黷者尚冒禁盗之况此亡國之遺物乎贈黄中錢三百萬以旌其潔黄中唐相眈四世孫也年七歲以童子舉及第李文公昉贈之詩曰七歲神童古所難賈家門户有衣冠十人科第排頭上五部經書誦舌端見榜不知名字貴登筵未識管絃歡從今穩上青雲去萬里誰能測羽翰至太平興國中遂叅大政年五十六以卒太宗厚恤其家謂其母曰勿以諸孫及私門之窘自撓朕嘗記之也黄中之孫種民者元豐中為宰相蔡確所用官大理寺丞鍜鍊故相陳恭公執中之子世孺與其婦獄至極典天下寃之又以蔡確風㫖就府第問同知樞密院呂公公著呼公之子希純及老嫗立庭下問世孺妻呂氏請求事以枷捶脅之希純等曰呂氏因樞密之姪嘗以此事來告樞密樞密不語垂涕而已竟無以為罪神宗知之怒曰元無㫖就問呂公著賈種民小臣輒敢凌辱執政特衝替黄中之後衰矣賈黄中字媧民滄州人唐相耽之裔所贈詩或云竇儀年十五舉進士授校書郎集賢校理左拾遺補闕嶺南平為采訪使江南平知昇州召還知制誥遷翰林學士太宗多召見訪以時政得失對曰職當書詔思不出位太宗益重之除給事中叅知政事太宗召見其母王氏命之坐謂曰教子如是今之孟母也性端重守家法多知臺閣故事朝之典禮資以損益當時名士皆出其門有文集行於世三十卷公與宋白李至呂蒙正蘇易簡五人同拜翰林學士時承㫖扈蒙贈詩曰五鳳齊飛入翰林其後皆為名臣聞見録卷六
