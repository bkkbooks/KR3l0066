body:
  text: 聞見録小說家𩔖一雜事之屬提要臣等謹案聞見録二十卷宋邵伯溫撰伯溫字子文邵子之子猶及見元祐諸耆舊故於當時朝政具悉端委是書成於紹興二年前十六卷記太祖以来故事而於王安石新法始末及一時同異之論載之尤詳其論洛蜀朔三黨相攻惜其各立門户授小人以間又引程子之言以為變法由於激成皆平心之論其記燈籠錦事出文彦博之妻於事理較近其記韓富之隙由撤簾不由定策亦足以訂强至家𫝊之訛周必大跋吕獻可墓誌謂伯溫是書頗多荒唐凡所書人及其嵗月鮮不差悞殆好惡已甚之詞不盡然也十七卷多記雜事其洛陽永樂諸條多寓麥秀黍離之感十八卷至二十卷皆記邵子之言行而殤女轉生黑猿感孕意欲神竒其父轉涉妖誣又記邵子之言謂老子得易之體孟子得易之用文中子以佛為西方聖人亦不以為非似乎附㑹至投壺一事益猥瑣不足紀葢亦擇焉不精者取其大㫖可爾乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀聞見録自序易曰君子多識前言往行以畜其德孟子曰則聞而知之則見而知之伯溫以先君子之故親接前輩與夫侍家庭居鄉黨遊宦學得前言往行為多以畜其德則不敢當而老景侵尋偶負後死者之責類之為書曰聞見録尚庶幾焉紹興二年十一月十五日甲子河南邵伯溫書
