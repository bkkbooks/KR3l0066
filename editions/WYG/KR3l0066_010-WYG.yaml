body:
  text: 聞見録卷十宋邵伯溫撰文潞公慶厯間以樞密直學士知成都府公年未四十成都風俗喜行樂公多燕集有飛語至京師御史何郯聖從蜀人因謁告歸上遣伺察之聖從將至潞公亦為之動張俞少愚者謂公曰聖從之來無足念少愚因迎見於漢州同郡㑹有營妓善舞聖從喜之問其姓妓曰楊聖從曰所謂楊臺桞者少愚即取妓之項帕羅題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊臺栁舞盡春風萬萬條命其妓作栁枝詞歌之聖從為之霑醉後數日聖從至成都頗嚴重一日潞公大作樂以燕聖從迎其妓雜府妓中歌少愚之詩以酌聖從聖從每為之醉聖從還朝潞公之謗乃息事與陶榖使江南郵亭詞相類云張少愚者奇士潞公固重其人也韓魏公留守北京李稷以國子博士為漕頗慢公公不為較待之甚禮俄潞公代魏公為留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將庭訓之公至北京李稷謁見坐客次久之公着道服出語之曰而父吾客也只八拜稷不獲已如數拜之稷後移陜漕方五路興兵取靈武稷隨軍威勢益盛一日早作入鄜延軍營軍士鳴鼓聲喏帥种諤臥帳中未興諤忙之出對稷呼皷角將問曰軍有幾帥曰太尉耳帥未升帳輒為轉運糧草官鳴鼓聲喏何也借汝之頭以代運使者叱出斬之稷倉皇引去怖甚不能上馬自此不敢入諤軍後朝廷遣給事中徐禧同延安帥沈括副帥种諤領兵築永樂城諤議不合括以聞朝廷留諤守延安括專永樂之役未至夏人傾國圍永樂城已急監軍李舜舉衣襟作奏曰臣無所恨願朝廷勿輕此賊李稷亦作奏但云臣千苦萬苦也神宗得奏皆為之動城破既徐禧不知所在或云降蕃張芸叟言有自西夏歸見之者舜自經死或云李稷以酷虐乘亂為官軍所殺嗚呼稷不得其死宜哉文潞公判北京有汪輔之者新除運判為人褊急初入謁潞公方坐㕔事閱謁置按上不問入宅久之乃出輔之已不堪既見公禮之甚簡謂曰家人須令沐髮忘見運判勿訝輔之沮甚舊例監司至之三日府必作㑹公故罷之輔之移文定日撿按府庫通判以次白公公不答是日公家宴内外事並不許通輔之坐都㕔吏白侍郞中家宴匙鑰不可請輔之怒破架閣庫鏁亦無從撿按也密劾潞公不治神宗批輔之所上奏付潞公有云侍中舊德故煩臥䕶北門細務不必勞心輔之小臣敢爾無禮將别有處置之語潞公得之不言一日㑹監司曰老謬無狀幸諸君寛之監司皆愧謝因出御批以示輔之輔之皇恐逃歸託按郡以出未幾輔之罷嗚呼神宗眷遇大臣沮抑小人如此可謂聖矣元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官唐介參政之子義問為轉運判官退謂其客尹煥曰先君為臺官嘗言潞公今豈挾以為恨耶其當避之煥曰潞公所為必有理姑聽之明日公交府事以次見監司府官如常儀或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣義問聞之復謂煥曰微君殆有失於潞公也一日潞公謂義問曰仁宗朝先參政為臺諫以言某謫官某亦罷相判許州未幾某復召還相位某上言唐某所言正中臣罪召臣未召唐某臣不敢行仁宗用某言起參政通判潭州尋至大用與某同執政相知為深義問聞潞公之言至感泣自此出入潞公門下後潞公為平章重事薦義問以集賢殿修撰帥荆南嗚呼潞公之德度絶人葢如此洛城之南東午橋距長夏門五里蔡君謨為記葢自唐已來為游觀之地裴晉公緑野庄今為文定張公别墅白樂天白蓮庄今為少師任公别墅池臺故基猶在二庄雖隔城高槐古柳高下相連接午橋西南二十里分洛堰司洛水正南十八里龍門堰引伊水以大石為杠互受二水洛水一支自後載門入城分諸園復合一渠繇天門街北天津引龍一橋之南東至羅門伊水一支正北入城又一支東南入城皆北行分諸園復合一渠由長夏門以東以北至羅門皆入於漕河所以洛中公卿庶士園宅多有水竹花木之勝元豐初開清汴禁伊洛水入城諸園為廢花木皆枯死故都形勢遂減四年文潞公留守以漕河故道湮塞復引伊洛水入城入漕河至偃師與伊洛滙以通漕運𨽻白波輦運司詔可之自是由洛舟行河至京師公私便之洛城園圃復盛公作亭河上榜曰漕河新亭元祐間公還政歸第以几杖罇俎臨是亭士女從公遊洛焉元豐五年文潞公以太尉留守西都時富韓公以司徒致仕潞公慕唐白樂天九老㑹乃集洛中卿大夫年德高者為耆英㑹以洛中風俗尚齒不尚官就資勝院建大厦曰耆英堂命閩人鄭奐繪像其中時富韓公年七十九文潞公與司封郎中席汝言皆七十七朝議大夫王尚恭年七十六太常少卿趙丙祕書監劉几衛州防禦使馮行已皆年七十五天章閣待制楚建中朝議大夫王慎言皆七十二大中大夫張問龍圖閣直學士張燾皆年七十時宣徽使王公拱辰留守北京貽書潞公願預其㑹年七十一獨司馬溫公年未七十潞公素重其人用唐九老狄兼謩故事請入㑹溫公辭以晚進不敢班富文二公之後潞公不從令鄭奐自幕後傳溫公像又至北京傳王公像於是預其㑹者凡十三人潞公以地主攜妓樂就富公宅第一㑹至富公㑹送羊酒不出餘皆次為㑹洛陽多名園古刹有水竹林亭之勝諸老鬚眉皓白衣冠甚偉每宴集都人隨觀之潞公又為同甲會司馬朝議旦程中散晌席司封汝言皆丙午人也亦繪像資勝院其後司馬公與數公又為真率㑹有約酒不過五行食不過五味惟菜無限楚正議違約増飲食之數罰一㑹皆洛陽太平盛事也洛之士庶又生祠潞公於資勝院溫公取神宗送潞公河南詩𨽻書於榜曰竚瞻堂塑公像其中冠劍偉然都人事之甚肅初溫公自以晚輩不敢預富文二公之㑹潞公㑹溫公曰某留守北京遣人入大遼偵事囘云見遼主大宴羣臣伶人劇戲作衣冠者見物必攫取懐之有從其後以挺扑之者曰司馬端明􅁘君實清名在夷狄如此溫公愧謝方潞公作耆英㑹時康節先生已下世有中散大夫吳執中者少年登科皇祐初已作祕書丞不樂仕進覔休致其年德不在諸公下居洛多杜門人不識其面獨與康節相善執中未嘗一至公府其不預㑹者非潞公遺之也文潞公嘗曰人但以某長年為慶獨不知閲世既久内外親戚皆亡一時交遊凋零殆盡所接皆邈然少年無可論舊事者正亦無足慶也范忠宣公亦曰或相勉以攝生之理不知人非久在世之物假如丁令威千歲化鶴歸鄉見城郭人民皆非則獨存何足樂者嗚呼皆達理之言也英宗即位侍御史呂誨獻可言歐陽修首建邪議推尊濮安懿王有累聖德并劾韓琦曽公亮趙槩積十餘章不從乞自貶又十餘章率其屬以御史敷告納帝前曰臣言不效不敢居此位出知蘄州徙晉州神宗即位擢天章閣待制復知諫院擢御史中丞帝方勵精求治一日紫宸早朝二府奏事久日刻匽例隔登對官於後殿須上更衣復坐以次賛引獻可待對於崇政司馬溫公為翰林學士侍讀邇英閣亦趨賛善堂待召相遇朝路並行而北溫公密問曰今日請對何所言獻可舉手曰袖中彈文乃新參也溫公愕然曰王介甫素有學行命下之日衆皆喜於得人奈何論之獻可正色曰君實亦為此言耶安石雖有時名好執偏見不通物情輕信姦囘喜人佞已聽其言則美施於用則疎若在侍從猶或可容置諸宰輔天下必受其禍矣溫公又諭之曰與公相知有所懐不敢不盡未見其不善之迹遽論之不可獻可曰上新嗣位富於春秋朝夕謀議者二三執政爾茍非其人則敗國事此乃腹心之疾治之惟恐不及顧可緩耶語未竟閣門吏抗聲追班乃各趨以去溫公自經筵退黙坐玉堂終思之不得其説既而縉紳間寖有傳疏説者多以為大過未幾中書省置三司條例司相與議論者以經綸天下為己任始變祖宗舊法專務聚歛私立條目頒於四方妄引周官以實誅賞輔弼異議不能囘臺諫從官力爭不能奪州郡或奉行微忤其意則譴黜從之所用皆憸薄少年天下騷然於是昔之懐疑者始愧仰歎服以獻可為知人溫公與安石相論辨尤力神宗欲兩用之命溫公為樞密副使溫公以言不從不拜以三書抵安石冀其或聽而改也安石如故所為終安石不聽乃絶交溫公既出退居於洛每慨然曰呂獻可之先見吾不及也獻可言安石不已出知鄧州康節先生與獻可善方獻可初赴召康節與論天下事至獻可謫官無一不如所言者故獻可之為鄧州也康節寄以詩云一别星霜二紀中升沉音問不相通林間談笑須歸我天下安危且係公萬乘几前當蹇諤百花洲上略相從不知月白風清夜能憶伊川舊釣翁獻可和云冥冥鴻羽在雲天邈阻風音已十年不謂聖朝求治理尚容遺逸臥林泉羡君自有隨時樂顧我官閒飽晝眠應笑無成三黜後病衰方始賦歸田獻可尋請宮祠歸洛溫公康節日相往來獻可病自草章乞致仕曰臣無宿疾偶值醫者用術乖方殊不知脉候有虚實隂陽有逆順診察有摽本治療有先後妄投湯劑率任情意差之指下禍延四肢寢成風痺遂難行歩非秪憚􅏓盭之苦又將虞心腹之變勢已及此為之奈何雖然一身之微固未足恤其如九族之託良以為憂是思納禄以偷生不俟引年而還政葢以一身之疾喻朝政之病也溫公康節日就臥内問疾獻可所言皆天下國家之事憂憤不能忘未嘗一語及其私也一日手書託溫公以墓銘溫公亟省之已瞑目矣溫公呼之曰更有以見屬乎獻可復張目曰天下事尚可為君實勉之故溫公誌其墓論獻可為中丞時則曰有侍臣棄官家居者朝野稱其才以為古今少倫天子引參大政衆皆喜於得人獻可獨以為不然衆莫不怪之居無何新為政者恃其才棄衆任已厭嘗為奇多變更祖宗法専及斂民財所愛信引拔時或非其人天下大失望獻可屢爭不能及抗章條其過失曰誤天下蒼生者必此人也使久居廟堂必無安靖之理又曰天下本無事但庸人擾之爾誌未成河南監牧使劉航仲通自請書石既見其文仲通復遲囘不敢書時安石在相位也仲通之子安世曰成吾父之美可乎代書之仲通又隂祝獻可諸子勿摹本恐非三家之福時用小人蔡天申為京西察訪置司西都天申厚賂鐫工得本以獻安石天申初欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也獻可忍死謂溫公以天下尚可為當自愛後溫公相天下再致元祐之盛獻可不及見矣天下誦其言而悲之至溫公薨獻可之子由庚作挽詩云地下若逢中執法為言今日再昇平記其先人之言也司馬溫公嘗曰昔與王介甫同為羣牧司判官包孝肅公為使時號清嚴一日羣牧司牡丹盛開包公置酒賞之公舉酒相勸某素不喜酒亦强飲介甫終席不飲包公不能强也某以此知其不屈聞見録卷十
