body:
  text: 聞見録卷三宋邵伯溫撰英宗於仁宗為姪宣仁后於光獻為甥自幼同養禁中溫成張妃有寵英宗還本宮宣仁還本宅溫成薨而竟無子一日帝謂光獻曰吾夫婦老無子舊養十三英宗行次滔滔宣仁小字各已長立朕為十三后為滔滔主婚使相娶嫁時宮中謂天子娶婦皇后嫁女云蓋仁宗光獻以英宗為子聖意素定矣此殆天命非人力也至召英宗為皇子入謝帝與后適御後苑迎曙曙英宗諱亭帝謂后曰豈偶然哉嘉祐八年三月晦日帝起居尚安夜一更遽索藥且召后后至帝指心不能言宣醫投藥已無及帝崩左右欲開宮門召兩府后曰此際宮門不可開但以密敕召兩府黎明入又三令進粥四更再召醫入使人守之望旦兩府入后哭告以上崩令召皇子嗣位英宗初不敢當兩府共抱之解其髮被以黃衣命翰林學士圭懼甚筆不能下丞相魏公韓琦從容曰大行皇帝在位幾年圭乃能草詔英宗即位數日有疾執政大臣請光獻后垂簾權同聽政后辭退久之乃從則光獻立子之功其可掩哉故神宗深感之所以事光獻之禮甚至逮光獻之崩神宗哀毁不能視朝其所製挽章至今讀之令人流涕也韓魏公薨其子孫倣郭汾陽著家傳十卷具載魏公功業至英宗即位之初乃云光獻信讒屢有不平之語魏公以危言感動曰若官家失照管太后亦未得安穩又言太后曾問漢昌邑王事如何又云太后言昨夕夢甚異見這孩兒却在慶寧宮謂英宗復在舊邸魏公曰却在慶寧宮乃是聖躬復舊之兆此是好夢又言英宗不豫魏公奏曰大王長立且與照管謂神宗后怒曰尚欲舊窠中求兔耶又言太后對大臣泣訴英宗語曰富弼意主太后又云太后欲御前殿魏公論奏云云乃止又云臺諫有章乞早還政太后泣曰若放下更豈見眼道耶如此等事尚多皆誕妄不恭非所宜言韓氏子孫販賣松檟張大勳業以希進用不知陷其父祖於不義也王巖叟者父子為魏公之客亦著魏公遺事一編其記魏公言行甚詳至論光獻權同聽政事亦為欺誕謂太后還政之後魏公勸英宗加儀衛帝曰相公休奬縱母后又謂魏公對太后曰自家無子不得不認業其意以為英宗非魏公不得立既立非魏公不得安也英宗受仁宗天下貴為天子思所以報光獻之德者何以為稱反惜儀衛末禮有無奬縱母后之語於英宗孝德不無纍乎恭惟太皇太后天下之母也以其無子而令認業為臣子者悖慢至此不幾於跋扈老乎前代姦人自稱定䇿國老以天子為門生皆繇此以魏公之賢使死者有知其敢當也故神宗嘗曰如此恐非韓琦之意伯溫嘗論英宗之立首建議者范蜀公也繼之者司馬溫公也順成仁宗光獻意者韓魏公也富公辭户部尚書章呂誨中丞魏公以下遷官疏乃天下之公言也具書之以俟史官採擇英宗即位之初感疾不能視朝大臣請光獻太后垂簾權同聽政后辭之不獲乃從英宗才康復后已下手書復辟魏公奏臺諫有章疏請太后早還政后聞之遽起魏公急令儀鸞司撤簾后猶未轉御屏尚見其衣也時富韓公為樞密相怪魏公不關報撤簾事有韓魏公欲致弼於族滅之地之語歐陽公為參政首議追尊濮安懿王富公曰歐陽公讀書知禮法所以為此舉者忘仁宗纍主上欺韓公耳富公因辭執政例遷官疏言甚危三日不報見英宗面奏曰仁宗之立陛下皇太后之功也陛下未報皇太后大功先録臣之小勞非仁宗之意也方仁宗之世宗屬與陛下親相等者尚多必以陛下為子者以陛下孝德彰聞也今皇太后謂臣與胡宿吳奎等曰無夫婦人無所告至不忍聞臣實痛之豈仁宗之所望於陛下者哉以笏指御牀曰非陛下有孝德孰可居此英宗俯躬曰不敢富公求去益堅遂出判河陽自此與魏公歐陽公絶後富公致政居洛每嵗生日魏公不論逺近必遣使致書幣甚恭富公但答以老病無書魏公之禮終不替至薨乃已豈魏公有愧於富公者乎然天下兩賢之魏公歐陽公之薨也富公皆不祭弔國史著富公以不預䇿立英宗與魏公至此祭弔不通非也本朝自祖宗以儉德垂世故藝祖之訓曰當思在甲馬營時可也其所用幃簾有青布緣者仁宗生長太平尤節儉京城南愍賢寺溫成張妃墳院也寺中有溫成宮中故物素朱漆牀黃絹緣席黃隔織褥帝御飛白書溫成影帳牌才二尺朱漆金字而已以溫成寵冠六宮服用止此故帝寢疾大臣入問見所御皆黃紬嗚呼恭儉之德不在此乎英宗內無嬪御王廣淵以濮邸舊僚進待制貧不能辦儀物韓魏公為言帝曰無名以賜不可後數日有旨令廣淵書無逸篇於御屏賜白金百兩嗚呼吾本朝祖宗以節儉為家法如此光獻太皇太后元豐四年春感疾以文字一函封鐍甚密付神宗曰俟吾死開之唯不可因此罪人帝泣受后疾愈帝復納此函后曰姑收之是年七月后上仙帝開函皆仁宗欲立英宗為皇嗣時臣僚異議之書也神宗執書慟哭以太皇太后遺訓不敢追咎其人故帝宮中服三年之喪盡禮盡孝者知慈德之不可報也伯溫侍長老言曰本朝惟真宗咸平景德間為盛時契丹通和兵革不用家給人足以洛中言之民以車載酒食聲樂遊於通衢謂之棚車鼓笛仁宗天聖明道初尚如此至寶元康定間元昊叛西方用兵天下稍多事無復有此風矣元昊既稱臣帝絶口不言兵慶厯以後天下雖復太平終不若天聖明道之前也嗚呼仁宗之兵應兵也不得已而用之事平不用此所以為仁歟神宗開潁邸英宗命韓魏公擇宮僚用王陶韓維陳薦孫固孫思恭邵亢皆名儒厚德之士王陶韓維進止有法神宗內朝拜稍急維曰維下拜王當效之諸公一日侍神宗王近侍以弓樣靴進維曰王安用武靴神宗有愧色亟令毁去其翊贊之功如此故潁邸賓僚號天下選云神宗初即位中丞王陶言宰相韓魏公不押常朝班為跋扈帝遣近侍以章疏示魏公公奏曰臣非跋扈者陛下遣一小黃門至則可縳臣以去矣帝為之動出王陶知陳州神宗即位鋭意求治初用呂溱為翰林學士為開封府溱死又用滕甫為翰林學士為御史中丞甫性疏上時遣小黃門持短封御札問事甫誇示於人或有見御札中誤用字者乃反謗甫以為揚上之短上怒疏斥之以為逆人李逢親黨不復用時王安石居金陵初除母喪英宗屢召不至安石在仁宗時論立英宗為皇子與韓魏公不合故不敢入朝安石雖髙科有文學本逺人未為中朝士夫所服乃深交韓呂二家兄弟韓呂朝廷之巨室也天下之士不出於韓即出於呂韓氏兄弟綘字子華與安石同年高科維字持國學術尤高不出仕用大臣薦入館呂氏公著字晦叔最賢亦與安石為同年進士子華持國晦叔爭揚於朝安石之名始盛安石又結一時名德之士如司馬君實輩皆相善先是治平間神宗為潁王持國翊善每講論經義神宗稱善持國曰非某之説某之友王安石之説至神宗即位乃召安石以至大用神宗既退司馬溫公一時正人皆引去獨用王荆公盡變更祖宗法度用兵言利天下始紛然矣帝一日侍太后同祁王至太皇太后宮時宗祀前數日太皇太后曰天氣晴和行禮日亦如此大慶也帝曰然太皇太后曰吾昔聞民間疾苦必以告仁宗嘗因赦行之今亦當爾帝曰今無它事太皇太后曰吾聞民間甚苦青苗助役錢宜因赦罷之帝不懌曰以利民非苦之也太皇太后曰王安石誠有才學然怨之者甚衆帝欲愛惜保全不若暫出之於外嵗餘復召用可也帝曰羣臣中惟安石能橫身為國家當事耳祁王曰太皇太后之言至言也陛下不可不思帝因發怒曰是我敗壞天下耶汝自為之祁王泣曰何至是也皆不樂而罷溫公嘗私記富韓公之語如此而世無知者崇寧中蔡京等修哲宗史以王安石為聖人然亦書慈聖光獻后宣仁聖烈后因間見上流涕為言安石變亂天下已而安石罷相豈安石之罪雖其黨竟不能文耶抑天欲彰吾本朝母后之賢自不得而刪也帝退安石十年不用元豐末帝屬疾念可以託聖子者獨曰將以司馬光呂公著為師傅王安石不預也嗚呼聖矣哉神宗元豐四年召北京留守文潞公陪祀南郊會更官制自司徒侍中拜太尉罷侍中為開府儀同三司判河南府陛辭先是故參知政事王堯臣之子國老以至和中潞公與劉沆富韓公王參政堯臣共乞立英宗為皇嗣章草進明其父功帝留之禁中面問潞公公對與國老合乃加潞公兩鎮節度使官其子宗道為承事郎潞公力辭兩鎮止受食邑劉沆贈太師中書令兗國公子僅自祠部員外郎為天章閣待制王堯臣贈太師中書令諡文忠子國老自水部員外郎充祕閣校理富公進司徒子紹京除閣門祗候富公之客李偲問公曰公治平初進户部尚書屢辭今進司徒一辭而拜何也公曰治平初乃某自辭官今日潞公以下皆遷某豈敢堅辭妨他人也蓋潞公與荆公論政事不合出判北京七年不召自此帝眷禮復厚矣神宗初欲破夏國遂親征大遼御營兵甲器械旗幟皆備分河北諸路兵逐將置保甲民兵諸路騷動一日帝衣黃金甲以見光獻太后后曰官家著此天下人如何脫去不祥又欲京城安樓櫓后亦不許但以庫貯於諸門神宗友愛二弟不聽出於外至元祐初宣仁太后始命築宅於天波門外既就館哲宗奉宣仁后臨幸有旨二王諸子各進官一等舍人蘇軾行制辭曰先皇帝篤兄弟之好以恩勝義不許二叔出居於外蓋武王待周召之意太皇太后嚴朝廷之禮以義制恩始從其請出就外宅得孔子逺其子之義二聖不同同歸於道可以為萬世法朕奉侍兩宮按行新第顧瞻懷思澘然出涕昔漢明帝問東平王在家何等為樂王言為善最樂帝大其言因送列侯印十九枚諸子年十五以上悉帶之著之簡册天下不以為私今王諸子性于忠愛漸於禮義自勝衣以上頎然皆有成人之風朕甚嘉之其各進一官以助其為善之樂尚勉之哉毋忝父祖以為邦家之光次日丞相呂大防范純仁二夫人入見宣仁后曰昨同皇帝幸二王府二王侍立尚食甚恭皇帝待之亦盡禮吾老矣深以此為喜又曰仁宗事燕王盡子姪禮王頗自重但以行第呼仁宗雖禁中服用王輒取之仁宗不敢吝吾二兒豈敢如此嗚呼后之言其旨深矣不幸后上仙小人謗毁靡所不至天下寃之其詳伯溫著之辨誣云聞見録卷三
