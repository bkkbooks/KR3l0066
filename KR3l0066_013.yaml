body:
  text: 聞見録卷十三宋邵伯溫撰劉仲通慕司馬溫公吕獻可之賢方溫公欲志獻可墓時仲通自請書石溫公文出直書王介甫之罪不隱仲通始有懼意其子安世字器之出入溫公門下代其父書自此益知名至溫公入相元祐薦器之為館職謂器之曰足下知所以相薦否器之曰某獲從公遊舊矣公曰非也某閒居足下時節問訊不絶某位政府足下獨無書此某之所以相薦也至溫公薨器之官浸顯為溫公之學益篤故在臺諫以忠直敢言聞於時紹聖初黨禍起器之尤為章惇蔡卞所忌遠謫嶺外盛夏奉老母以行途人皆憐之器之不屈也抵一郡聞有使者自京師來人為器之危之郡將遣其客來勸器之治後事客泣涕以言器之色不動留客飯談笑自若對客取筆書數紙徐呼其紀綱之僕從容對曰聞朝廷賜我死即死依此數紙行之笑謂客曰死不難矣客從其僕取其所書紙閲之則皆經紀其家與經紀其同貶當死者之家事甚悉客驚歎以為不可及也器之留數日使者入海島杖死內臣陳衍章惇蔡卞固令迂往諸郡逼諸流人自盡耳器之一日行山中扶其母籃舁憩樹下有大蛇冉冉而至草木皆披靡擔夫驚走器之不動也蛇若相向者久之乃去村民羅拜器之曰官異人也蛇吾山之神也見官喜相迎耳官逺行無恙乎建中靖國初以上皇登極赦恩得歸居南京尋復從官帥定武蔡京用事再落職以死嗚呼溫公門下士多矣如器之者所守凜然死生禍福不變真元祐人也器之平生喜讀孟子故其剛大不枉之氣似之熙寧間上書者言泰州閒田萬餘頃賦民耕之歲可得榖三萬石因籍所賦者為弓箭手並邊有積年滯鈔不用用之以遷蜀貨而鬻於邊州官於古渭寨置市易務因之可以開河湟復故土斷胸奴右臂宰相力行其議知秦州事李師中極言其不可乃命開封府推官王堯臣同內侍押班李若愚按其實堯臣還奏曰臣按所謂閒田者皆無之且興貨以積境上實啓戎心開邊隙為後害甚大臣竊以謂不可也聞者以其言為難堯臣後為賢從官其墓志所載如此伯溫曰上書者王韶也宰相力行者王介甫也知秦州李師中者鄆州名臣李誠之待制也介甫主韶之說為熙河之役天下之士無敢言其不可者王公獨能言之難哉熙寧中朝廷有生老病死苦之語時王荆公改新法日為生事曾魯公以年老依違其間富韓公稱病不出唐參政與荆公爭按問欲舉直不勝疽發背死趙清獻唯聲苦時范忠宣公為侍御史皆劾之言荆公章云志在近功忘其舊學言富公章云謀身過於謀國言曾公趙公章云依違不斷可否忠宣每曰以王介甫比莽卓過矣但急於功利遂忘素守荆公猶欲用忠宣為同修起居注忠宣不從出為陜西漕又移成都漕荆公不悅竟以事罷之元豐初蔡確排吳充罷相指王圭為充黨欲並逐之圭畏確引用為執政時圭獨相久神宗厭薄之圭不悟確機警覺之一日密問圭曰近上意於公厚薄何如圭曰無他確曰上厭公矣圭曰奈何確曰上久欲收復靈武患無任責者公能任責則相位可保也圭喜謝之適江東漕張琬有違法事帝語圭欲遣官按治圭以帝意告都檢正俞充與琬善以書告琬琬上章自辨帝問圭曰張琬事唯語卿琬何從知圭以漏上語退朝甚憂召俞充問之充對以實圭曰某與君俱得罪矣然有一策當除君帥環慶亟上取靈武之章上喜罪可免乃除充待制帥環慶充果建取靈武之章未幾充暴卒以髙遵裕代之有旨以遵裕節度五路大兵為靈武之役涇原副帥劉昌祚領大部兵先至靈武城下以遵裕未至不敢進熙河李憲兵不至鄜延副帥种諤獨乞班師遵裕至夏人大集決黃河水以灌我師凍餒沉溺不戰而死者十餘萬人遵裕狼狽以遁虜追襲之諤擁兵不救以實其說推其兵端由王圭避漏泄上語之罪所致紹聖初謂圭策立哲宗有異議以為臣不忠追貶實非其罪而靈武之禍其罪也蔡確罪尤大貶死新州有以也夫蔡確鞫相州獄朝士被繫者確令獄卒與之同室而處同席而寢飲食旋溷共在一室置大盆於前凡饋食者羮飯餅餌悉投其中以杓自攪分飼之如犬豕置不問故繫者幸其得問無罪不承確専以起獄致位宰相云章惇者郇公之疏族舉進士在京師館於郇公之第私族父之妾為人所掩踰垣而出誤踐街中一嫗為嫗所訟時包公知開封府不復深究贖銅而已惇後及第在五六人間大不如意誚讓考試官人或求觀其敇擲地以示之士論忿其不恭熙寧初試館職御史言其無行罷之及介甫用事張郇李承之薦惇可用介甫曰聞惇大無行承之曰某所薦者才也顧惇才可用於今日耳素行何纍焉公試與語自當愛之介甫召見之惇素辨又善迎合介甫大喜恨得之晚擢用數年至兩制三司使右司馬溫公記惇如此伯溫作惇𫝊載辨誣甚詳楊元素為中丞與劉摯言助役有十害王荆公使張琥作十難以詰之琥辭不為曾布曰請為之仍詰二人向背好惡之情果何所在元素惶恐請曰臣愚不知助役之利乃爾當伏妄言之罪摯奮曰為人臣豈可壓於權勢使人主不知利害之實即復條對布所難者以伸前議且曰臣所向者陛下所背者權臣所好者忠直所惡者邪姦臣今獲罪譴逐固自其分但助役終為天下之患害願陛下勿忘臣言于是元素出知鄭州摯謫監衡州鹽倉琥亦由此忤荆公意坐事落修注吕惠卿丁父憂去王荆公未知心腹所託可與謀事者曾布時以著作佐郎編敇巧黠善迎合荆公意公悅之數日間相繼除中允館職判司農寺告謝之日抱敕告五六通布為都檢正故事白荆公即行時馮當世王禹玉並參政或曰當更白二公布曰丞相已定何問彼為俟敕出令押字耳故唐詗對兩府彈荆公文吕惠卿曾布安石心腹王圭元絳安石之僕𨽻又曰圭奴事安石猶懼不了云土蕃在唐最盛至本朝始衰今河奉邈川青唐洮岷以至階利文政綿州威茂黎移州夷人皆其遺種也獨罝勒斯賚一族最盛雖西夏亦畏之朝廷封西平王用為藩翰陜西州縣時置驛謂之置家位嵗貢奉不絶未開熙河前關中士人多言其利害雖張橫渠先生之賢少時亦欲結客以取范文正公帥延安招置府第俾修制科至登進士第其志乃已仁宗皇帝朝韓琦富弼二公為宰相凡言開邊者皆不納熙寧初王荆公執政始有開邊之議王韶者新安縣主簿遊邊得其說遂上開河之策荆公以為竒謀乃有熙河之役獨州白石大潭秦州屬縣有賦稅其餘無㪷粟尺布唯仰陜西州縣朝廷帑藏供給故自開熙河以來陜西民日困朝廷財用益耗初罝勒斯賚分處諸子於熙河洮岷之地罝勒斯賚死諸子皆衰弱故韶能取之罝勒斯賚諸子唯棟戩者在湟鄯最盛韶之勢止能取河州韶暫入朝果莊已舉兵攻河州遂有塔布之敗景思立死之紹聖初章惇作相曾布作樞密棟戬已自立為强臣鄂特凌古所篡國人畏之鄂特凌古死其子轄沁立國人思故主不忘轄沁懦弱欲為僧國人又欲殺之轄沁遂乞納土歸朝廷時帥熙河童貫初領邊事乃受之送于朝封官爵遣居熙州建中靖國初韓忠彥為相安燾為樞密遂棄􅙉鄯求罝氏苗裔立之韓忠彥罷蔡京作相復􅙉鄯責安燾與熙河帥姚師雄及凡議棄者邊事復興矣嗚呼朝廷受小國叛臣所納地不能正其罪又賞以官爵在理為不順靖康初言者乞求青唐種族以􅙉鄯之地賜之朝廷下熙河帥議以聞無敢任其責者乃已至大金陷陜之六路兵入熙河即求􅙉鄯舊族盡以其地與之嗟夫彼夷狄也能知行正道如此元豐八年三月五日神宗升遐詔至洛故相韓康公為留守程宗丞伯淳自御史出為汝州酒官㑹以檄來舉哀於府地既罷謂康公之子宗師兵部曰某以言新法不便忤大臣同列皆謫官某獨除監司某不敢當辭之念先帝見知之恩終無以報已而泣兵部曰今日朝廷之事何如宗丞曰司馬君實吕晦叔作相矣兵部曰二公果作相當何如宗丞曰當與元豐大臣同若先分黨與他日可憂兵部曰何憂宗丞曰元豐大臣皆嗜利者若使自變已甚害民之法則善矣不然衣冠之禍未艾也君實忠直難與議晦叔解事恐力不足耳既而二公果並相召宗丞未行以疾卒溫公申公亦相繼薨吕汲公微仲范忠宣公堯夫並相忠宣所見與宗丞同故蔡確貶新州忠宣獨以為不可至謂汲公曰公若重開此路吾輩將不免矣忠宣竟罷去嗚呼宗丞為溫公申公所重使不早死名位必與忠宣等更相調護協濟於朝則元祐朋黨之論無自而起也宗丞可謂有先見之明矣與韓兵部論此事時范醇夫朱公掞杜孝錫伯溫同聞之今四十年而其言益驗故為表出之哲宗即位宣仁后垂簾同聽政羣賢畢集於朝専以忠厚不擾為治和戎偃武愛民重穀庶幾嘉祐之風矣然雖賢者不免以類相從故當時有洛黨川黨朔黨之語洛黨者以程正叔侍講為領袖朱光庭賈易等為羽翼川黨者以蘇子瞻為領袖吕陶等為羽翼朔黨者以劉摯梁燾王巖叟劉安世為領袖羽翼尤衆諸黨相攻擊而已正叔多用古禮子瞻謂其不近人情如王介甫深疾之或加抗侮故朱光庭賈易不平皆以謗訕誣子瞻執政兩平之是時既退元豐大臣於散地皆銜怨刺骨隂伺間隙而諸賢者不悟自分黨相毁至紹聖初章惇為相同以為元祐黨盡竄嶺海之外可哀也吕微仲秦人戅直無黨范醇夫蜀人師溫公不立黨亦不免竄逐以死尤可哀也熙寧間梁丞相適薨聞光獻后有旨於相國寺飯僧資薦神宗問曰豈以梁適為仁宗舊相耶后曰微梁適吾無今日矣帝問其故曰吾初册后仁宗一日對宰輔言朕居宫中左右前後皆皇后之黨宰相陳執中請付外施行梁適進曰閭巷之人今日出一妻明日又出一妻猶為不可况天子乎執中之言非是仁宗不語久之曰梁適忠言也嗚呼唯仁宗之聖梁公之賢吾光獻后所以為宋之任姒歟李承之待制奇士蘇子瞻所謂李六丈人豪也為童子時論其父緯之功於朝久不報自詣漏舍以狀白丞相韓魏公公曰君果讀書自當取科名不用紛紛論賞也承之云先人功罪未辨深恐先犬馬溝壑無以見於地下故忍痛自言若欲求官稍識字第二人及第固不難魏公王堯臣榜第二人登科承之故云公聞其語矍然或云魏公德量服一世獨於承之終身不能平承之既登第官浸顯益有直聲唐介參政為臺官時言文潞公燈籠錦獻張貴妃事上怒甚謫介春州承之送以詩有去國一身輕似葉髙名千古重如山並遊英俊顔何厚未死奸諛骨已寒之句後介用潞公薦官於朝廷無所言承之以後從介索所送詩介無以報取詩還之曰我固不用落韻詩也以山寒二字韻不同故云可見承之剛正也承之在仁宗朝官州縣因邸吏報包拯拜參政或曰朝廷自此多事矣承之正色曰包公無能為今知鄞縣王安石者眼多白甚似王敦他日亂天下者此人也後荆公相神宗以天命不足畏祖宗不足法人言不足恤為述承之深詆之至吕獻可中丞死承之以詩哭之有好進賢須退忠臣死國憂吾生竟何益願卜九泉遊之句荆公之黨吕惠卿益怨之未有以發也㑹承之上章自敘神宗留其章禁中惠卿堅請領之惠卿因節略文意以天生微臣實為陛下等語故上意遂有愚弄人主之責終其身不至大用嗚呼士若承之豈孔子所謂剛者歟朱夀昌者少不知母所在棄官走天下求之刺血書佛經志甚苦熙寧初見於同州迎以歸朝士多以詩美之蘇內翰子瞻詩云感君離合我酸心此事今無古或聞王荆公薦李定為臺官定嘗不持母服臺諫給舍俱論其不孝不可用內翰因壽昌作詩貶定故曰此事今無古或聞也後定為御史中丞言內翰多作詩貶上自知湖州赴詔獄小人必欲殺之張文定范文忠二公上疏救不報天下知其不免矣內翰獄中作詩寄黃門公子由云與君世世為兄弟更結來生未斷因或上聞上覽之悽然卒赦之止以團練副使安置黃州元豐七年甲子六月二十六日洛中大雨伊洛漲壞天津橋波浪與上陽宫牆齊夜西南城破伊洛南北合而為一深丈餘公卿士庶第宅廬舍皆壞唯伊水東渠有積薪塞水口故水不入府第韓丞相康公尹洛撫循賑貸無盜賊之警人稍安後兩日有惡少數輩聲言水再至人皆號哭公命擒至決配之乃定聞於朝築水南新城新堤增築南羅城明年夏洛水復漲至新城隄下不能入洛人德之康公尹洛有異政此其大者聞見録卷十三
