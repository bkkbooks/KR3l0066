body:
  text: 聞見録卷十八宋邵伯溫撰伯溫曾祖母張夫人遇祖母李夫人嚴甚李夫人不能堪一夕欲自盡夢神人令以玉筯食羮一杯告曰無自盡當生佳兒夫人信之後夫人病瘦醫者既投藥又夢寢堂門之左右木瓜二株右者已枯因為大父言大父遽取藥令覆之及期生康節公同墮一死胎女也後十餘年夫人病卧堂上見月色中一女子拜庭下泣曰母不察庸醫以藥毒兒可恨夫人曰命也女子曰若為命何兄獨生夫人曰汝死兄獨生乃命也女子涕泣而去又十餘年夫人再見女子來泣曰一為庸醫所誤二十年方得受生與母緣重故相别又涕泣而去則知釋氏輪回鬼神之説有可信者康節知而不言者也親謂伯母當作某云伊川丈人與李夫人因山行於雲霧間見大黑猿有感夫人遂孕臨蓐時慈烏滿庭人以為瑞是生康節公公初生髮被面有齒能呼母七嵗戲於庭蟻穴中豁然别見天日雲氣往來久之以告夫人夫人至無所見禁勿言既長遊學晉州山路馬突同墜深澗中從者攀緣下尋公無所傷唯壞一帽熙寧十年公年六十七矣夏六月屬微疾一日晝睡覺且言曰吾夢旌旗鶴鴈自空而下下導吾行亂山與司馬君實吕晦叔諸公相分别於一驛亭回視其壁間有大書四字曰千秋萬嵗吾神往矣無以醫藥相逼也嗚呼異哉太學博士薑愚字子發京師人長康節先公一嵗從康節學稱門生先公年四十五未娶潞州張仲賓太博字穆之自未第亦從康節子發與二君同白康節曰不孝有三無後為大先生年踰四十不娶親老無子恐未足以為髙康節曰貧不能娶非為髙也子發曰某同學生王允修頗樂善有妹甚賢似足以當先生穆之曰先生欲婚則某備聘令子發與王允修言之康節遂娶先夫人後二年伯溫始生故康節有詩云我今行年四十七生男方始為人父鞠育教誨誠在我壽夭賢愚繫於汝我若壽命七十嵗眼前見汝二十五我欲願汝成大賢未知天意肯從否子發本京師富家氣豪樂施登進士第月分半俸奉康節治平間知壽州六安縣以目疾分司居新鄉子發死康節以其女嫁河南進士紀輝視之如已女伯溫以姊視之元符三年紀輝與薑女俱亡今二子樂道未遇時與子發交逰甚善樂道苦貧教小學京師居州西子發居州東相去遠一日大雪子發念樂道與其母寒飢自荷一杖踐雪以行至樂道之居扣門久之方應樂道同母凍坐日已過髙未飯子發惻然亟出買酒肉薪炭往復同樂道母子附火飲食樂道覺子發衣單問之以綿衣質錢買飯食也子發説論語士人樂聽之為一講會得錢數百千為樂道娶妻樂道登第調睦州判官妻卒子發又為求范文正公夫人姪汶陽李氏以繼其負義如此熙寧初樂道以翰林侍讀學士為西京留守子發老益貧且喪眀自新鄉駕小車來見樂道意樂道哀之也樂道遺酒三十壺而已子發殊悵然康節館於天津之廬典衣贐其行歸新鄉未幾卒康節先公少日遊學先祖母李夫人思之恍惚至倒誦佛書康節亟歸不復出夫人捐館康節特毁甚躬自㸑以養祖父置家蘇門山下康節獨築室百源之上時李成之子挺之東方大儒也權共城縣令一見康節心相契授以大學康節益自克勵三年不設榻晝夜危坐以思寫周易一部貼屋壁間日誦數十遍聞汾州任先生者有易學又往質之挺之去為河陽司戶曹康節亦從之寓州學貧甚以飲食之油貯燈讀書一日有將校自京師出代者見康節曰誰苦學如秀才者以紙百幅筆十枝為獻康節辭而後受每舉此語先夫人吾少艱難如此當為子孫言之康節又嘗謂伯溫曰吾早嵗徒步逰學至有所立艱哉程伯淳正叔雖為名士本出貴家其成就易矣因泣書之以示子孫康節先公慶厯間過洛館於水北湯氏愛其山水風俗之美始有卜築之意至皇祐元年自衛州共城奉大父伊川丈人遷居焉門生懷州武陟知縣侯紹曾字孝傑助其行初學天宫寺三學院劉諫議元瑜字君玉吕諫議獻可靜居張少卿師錫及其子職方君景伯狀元師德之子諫議君景憲王諫議益柔字勝之子中散兄弟諤字師柔及其子孫南國張大丞師雄及諸子劉龍圗之子祕監几字伯壽修撰忱字明復侍講李實字景真吳少卿執中王學士起字仲儒李侍講育字仲象子籲字端伯姚郎中奭字周輔交逰最密或稱門生洛人為買宅於履道坊西天慶觀東趙諫議借田於汝州葉縣后王不疑同鄉人買田於河南延秋村康節復還葉縣之田嘉祐七年王宣徽尹洛就天宫寺西天津橋南五代節度使安審琦宅故基以郭崇廢宅餘材為屋三十間請康節還居之富韓公命其客孟約買對宅一園皆有水竹花木之勝熙寧初行買官田之法天津之居亦官地榜三月人不忍買諸公曰使先生之宅他人居之吾輩蒙恥矣司馬溫公而下集錢買之康節先生以詩謝王宣徽曰嘉祐壬寅嵗新巢始孱功正分道德里更近帝王宫檻仰端門峻軒迎兩觀雄窗虛響瀍澗臺逈粲伊嵩好景尤難得昌辰豈易逢無才濟天下有分樂年豐水竹腹心裏鶯花淵藪中老來歡不已端節歎何窮嘯傲陪真侣經營荷府公丹誠徒自寫匪報自恩隆后以詩謝溫公諸公曰重謝諸公為買園買園城裏占林泉七千來步平流水二十餘家爭出錢嘉祐卜居終是僦熙寧受劵遂能專鳳凰樓下新間客道德坊中舊散仙洛浦清風朝滿袖嵩岑皓月夜盈軒接㒿倒戴芰荷畔談麈輕揮楊栁邊陌徹銅駝花爛漫堤連金谷草芊綿青春未老尚可出紅日已髙猶自眠洞號長生宜有主窩名安樂豈無權敢於世上明開眼會向人間别看天盡送光陰歸酒盞都移造化入詩篇也知此片好田地消得堯夫筆似椽今宅契司馬溫公户名園契富韓公户名莊契王郎中戶名康節初不改也康節蓋曰貧家未嘗求於人人饋之雖少必受嘗謂伯溫曰名利不可兼也吾本求名既為世所知矣何用利哉故甘貧樂道平生無不足之意嗟夫洛陽風俗之厚人物之盛不可見矣重念老境可傷因詳書之以示子孫云康節先公謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患故觀盛化詩曰紛紛五代亂離間一旦雲開復見天草木百年新雨露車書萬里舊山川尋常巷陌猶簪紱取次園亭亦管絃人老太平春未老鶯花無害日髙眠又曰吾曹養拙賴明時為幸居多寧不知天下英才中遁迹人間好景處開眉生來只慣見豐稔老去未嘗經亂離五事厯將前代舉帝堯而下固無之伯溫竊疑未嘗經亂離為太甚先公曰吾老且死汝輩行自知之永念先公當本朝太平盛時隱居求志謝聘不屈其發為詩章每如此康節先公與富文忠公早相知文忠初入相謂門下士田棐大卿曰為我問邵堯夫可出當以官職起之不即命為先生處士以遂隱居之志田大卿為康節言康節不答以詩二章謝之曰相招多謝不相遺將為胸中有所施若進豈能禁吏意既間安用更名為願同巢許稱臣日甘老唐虞比屋時滿眼清賢在朝列病夫無以繫安危又云欲遂終焉老間計未知天意果如何幾重軒冕酬身貴得此雲山到眼多好景未嘗無興詠壯心都已入消磨鵷鴻自有江湖樂安用區區設網羅文忠公終不相忘乃因眀堂祫享赦詔天下舉遺逸公意謂河南府必以康節應詔時文潞公尹洛以兩府禮召見康節康節不屈遂以福建黃景應詔景字子蒙亦從康節逰客李邯鄲公家公之子壽朋薦於潞公時天下應詔者二十八人同見宰執於政事堂至河南黃景以閩音自通姓名文忠不樂各試論一首命官為試銜知縣文忠奏天下尚有遺材乞再令舉詔從之王拱辰尚書尹洛乃以康節應詔潁川薦常秩皆先除試將作監主簿不理選限文忠招康節而不欲私故以天下為請知制誥王介甫不識康節繳還辭頭曰使邵某常民一試銜亦不可與果賢者不當止與試銜宜召試然後官之上不納下知制誥祖無擇除去不理選限行詞然康節與常秩皆不起是時富公已丁太夫人憂去位矣熙寧二年神宗初即位詔天下舉遺逸御史中丞三司副使吳充龍圖閣學士祖無擇皆薦康節時歐陽公作參知政事素重常秩故潁川亦再以秩應詔康節除祕書省校書郎潁州團練推官辭不許既受命即引疾不起答鄉人二詩一曰平生不作皺睂事天下應無切齒人斷送落花安用雨裝添舊物豈須春幸逢堯舜為真主且放巢由作外臣六十病夫宜揣分監司何用苦開陳二曰却恐鄉人未甚知相知深後更何疑貧時與祿是可受老後得官難更為自有林泉安素志況無才業動丹墀荀揚若守吾儒分免被韓文議小疵常秩以職官起時王介甫方行新法天下紛然以為不便思得山林之士相合常秩賜對神宗問曰仁宗召卿何故不起朕召何故起秩曰仁宗容臣不起陛下不容臣不起因盛言新法之便乃除諫官以至待制帝浸薄之介甫主之不忘然亦知其為人矣熙寧初介甫之弟安國字平甫為西京國子監教授從康節逰歸以出處語介甫介甫歎曰邵堯夫之賢不可及矣神宗正史康節列傳史臣書云與常秩同召某卒不起有以也夫康節先公與富韓公有舊公自汝州得請歸洛養疾築大第與康節天津隱居相邇公曰自此可時相招矣康節曰某冬夏不出春秋時間過親舊間公相招未必來不召或自至公謝客戒子曰先生來不以時見康節一日過之公作詩云先生自衛客西畿樂道安間絶世機再命初筵終不起獨甘窮巷寂無依貫穿百代嘗探古吟詠千篇亦造微珍重相知忽相訪醉和風雨夜深歸康節和曰道堂間話幾多時塵外杯觴不浪飛初上小車人已識醉和風雨夜深歸又題康節擊壤詩集云黎民於變是堯時便字堯夫德可知更覽新詩名擊壤先生全道略無遺其知康節如此公嘗令二青衣蒼頭掖之以行一日與康節會後園中因康節論天下事公喜甚不覺獨步下堂康節不為起徐指二蒼頭戲公曰忘却拄杖矣公深居託疾謝客而公嘗苦氣痞康節曰好事到手畏慎不為他人做了鬱鬱何益公笑曰此事未易言也蓋為嘉祐建儲耳雖剛勇遇事詳審不萬全不發康節因戲之公一日有憂色康節問公曰先生度某之憂安在康節曰豈以王安石罷相吕惠卿參知政事惠卿凶暴過安石乎公曰然康節曰公無憂安石惠卿本以勢利合惠卿安石勢利相敵將自為仇矣不暇害他人也未幾惠卿果叛安石凡可以害安石者無所不至公謂康節曰先生識慮絶人逺矣一日薄暮司馬公見康節曰明日僧顯修開堂説法富公吕晦叔欲偕往聽之晦叔貪佛已不可勸富公果往於理未便某後進不敢言先生曷止之康節曰恨聞之晚矣明日公果往後康節因見公謂公曰聞上欲用裴晉公禮起公公笑曰先生以謂某衰病能起否康節曰固也或人言上命公公不起一僧開堂公乃出無乃不可乎公驚曰某未之思也與康節食笋康節曰筍味甚美公曰未如中堂骨頭之美也康節曰野人林下食筍三十年未嘗為人所奪公今日可食中堂骨頭乎公笑而止康節疾病公日遣其子偕醫者來饋藥物不絶康節捐館公賻贈之甚厚伯溫除喪往拜公公惻然曰先生髙嘗勸之學修養復曰不能學胡走亂走也問伯溫年幾何娶未伯溫對年二十四未娶公曰晚娶甚善可以保養血氣專意學問吾年二十八登科方娶嘗白先公先夫人未第決不娶弟妹當先嫁娶之故田氏妹先嫁元鈞也伯溫自此得出入公門下悲夫今海內之士嘗獲拜公牀下唯伯溫一人想公英偉之姿凜然如在世也熙寧三年司馬溫公與王荆公議新法不合不拜樞密副使乞守郡以端明殿學士知永興軍後數月神宗思之曰使司馬在朝人主自然無過舉移許州令過闕上殿公力辭乞判西京留司御史臺遂居洛買園於尊賢坊以獨樂名之始與伯溫先君子康節遊嘗曰光陕人先生衛人今同居洛即鄉人也有如先生道學之尊當以年德為貴官職不足道也公一日著深衣自崇德寺書局散步洛水堤上因過康節天津之居謁曰程秀才云既見溫公也問其故公笑曰司馬出程伯休父故曰程留詩云拜罷歸來抵寺居解鞍縱馬罷傳呼紫衣金帶盡脫去便是林間一野夫草軟波清沙路微手擕笻杖著深衣白鷗不信忘機久見我猶穿栁岸飛康節和曰冠蓋紛華塞九衢聲名相軋在前呼獨君都不將為事始信人間有丈夫風背河聲近亦微斜陽淡泊隔雲衣一雙白鷺來煙外將下沙頭卻背飛公一日登崇德閣約康節久未至有詩曰淡日濃雲合復開碧伊清洛逺縈回林間髙閣望已久花外小車猶未來康節和云君家梁上年時燕過社今年尚未回謂罰誤君凝佇久萬花深處小車來又云天啓夫君八斗才野人中路必須回神仙一語難忘處花外小車猶未來康節有安樂窩中詩云半記不記夢覺後似愁無愁情倦時擁衾側卧未欲起簾外落花撩亂飛公愛之請書紙簾上字畫奇古某家世寶之公與康節唱酬甚多具載擊壤集公嘗問康節曰某何如人曰君實腳踏實地人也公深以為知言至康節捐館公作挽詩二章其一曰慕德聞風久論交傾蓋新何須半面舊不待一言親講道切磋直忘懷笑語真重言蒙跖實佩服敢書紳記康節之言也康節又曰君實九分人也其重之如此後公以康節之故遇其孤伯溫甚厚公無子以族人之子康為嗣康字公休其賢似公識者謂天故生之也公休與伯溫交遊益厚公薨公休免喪元祐間方欲大用亦不幸特贈諫議大夫公休有子植方數嵗公休素以屬伯溫至范純夫內翰輩皆曰將以成溫公之後者非伯溫不可朝廷知之伯溫自長子縣尉移西京國子監教授俾植得以卒業因經紀司馬氏之家植字子立既長其賢如公休天下謂真溫公門户中人也亦蚤死無子溫公之世遂絶司馬溫公初居洛問於康節曰有尹材字處初張雲卿字伯紀田述古字明之三人皆賢後處初明之得進於溫公門下獨伯紀未見康節以問公公曰處初明之之賢如先生言張君者或聞旅殯其父於和州久不省未敢與見康節曰張雲卿可謂孝矣雲卿之父謫官死和州貧不能歸因寓其喪雲卿奉其母歸洛貧甚府尹哀之俾為國子監説書得月俸七千以養若為和州一行則罷俸數月將飢其母矣其故如此溫公悵然曰某之聽誤矣伯紀自此亦從溫公遊未幾伯紀之母死徒步至和州迎父柩合葬三君子既受知溫公公入相元祐處初明之以遺逸命伯紀以纍舉特恩同除學官溫公好賢下士尊用康節之言如此伯紀學問該洽文潞公於經史注疏或有遺忘多從伯紀質之康節先生與趙宗道學士遊宗道年長康節拜之其諸子皆以父師之禮事康節宗道早出富韓公門下熙寧初宗道自西都留臺領宫祠以卒先是宗道季子濟為提舉常平劾富公不行新法朝廷坐其言罷富公使相宗道卒富公以致政居洛賻恤其家甚厚其兄弟服除欲往謝富公濟獨未敢行請於康節康節曰以富公德度尚何望於君第往勿疑諸兄行君不行是自處以不肖也明日濟偕諸兄以進富公撫之甚恩濟不自安起謝罪公止之曰吾見故人子前日公事不可論也濟謝康節曰微先生濟之過不可贖也熙寧癸丑春大名王荀龍字仲賢入洛見康節先公其議論徑正有過人者康節喜之和其詩曰車從賞花來北京耿君先期已馳情此時隕霜奈何重今嵗開花徒有聲既辱佳章當墜刺寧無纍句代通名天之美才應自惜料得不為時虛生仲賢魏公客也因出魏公送行詩顔體大書極奇偉康節曰吾少日喜作大字李挺之曰學書妨學道故嘗有詩云憶昔初學大字時學人飲酒與吟詩若非益友推金石四十五嵗成一非仲賢又誦魏公詩云春去花叢胡蝶亂雨餘蔬圃桔橰間康節愛之曰怨而不傷婉而成章之言也仲賢之子名巖叟字彥霖元祐初自知定州安喜縣召為監察御史有直聲後位簽書樞密院彥霖父子皆魏公之客魏公定相州薦彥霖為屬韓康公代魏公康公欲留彥霖彥霖謝曰某魏公之客不願出他門也士君子稱之康節先公嘗言李復圭龍圗臨事有斷年二十八知滑州與郡官夜會有衙兵奪銀匠鐵鎚殺人者一府皆驚擾公捕至立斬之上章待罪諸司亦按公擅殺仁宗曰李復圭帥才也除知慶州責光化軍有放停卒自陳乞添租剗佃某人官田者公曰汝揀停之兵如何能佃官田卒曰筋力未衰也公曰汝以衰故揀停既未衰卻合充軍呼刺字人刺元軍分人皆稱之公才髙為衆所忌故仕官數不進公居多不平康節因和其詩作天吟一篇曰一般顔色正蒼蒼今古人曾望斷腸日往月來無少異陽舒陰慘不相妨迅雷震後山川裂甘露零時草木香幽暗嵓崖生鬼魅清平郊野見鸞凰千秋爛為三春雨萬木凋因一夜霜此意分明難理會直須賢者入消詳蓋其意使有所感悟也康節先生赴河南尹李君錫會投壺君錫末箭中耳君錫曰偶爾中耳康節應聲曰幾乎敗壺坐客以為的對可謂善謔矣聞見録卷十八
